  .progress-bar { height: 12px; background: var(--bg2); border-radius: 6px; overflow: hidden; }

          <span id="prog-pct">0%</span>

        <button class="btn btn-primary btn-lg" id="btn-seed" onclick="startSeed()">🚀 Seed Questions</button>
        <button class="btn btn-outline" onclick="window.location.href='index.html'">← Back to Admin</button>
      </div>
      <div class="log-box" id="log-box">Waiting to start…\n</div>
    </div>
  </div>
</div>

<script>

// ============================================================
// GATE GEOLOGY PYQs — 2017 to 2024
// Representative questions across all key topics
// Each object: { year, type, text, options, correctOptions,
//               correctAnswer, posMarks, negMarks, tags, solution }
// ============================================================
const GATE_GEOLOGY_PYQs = [

  // ── 2024 ──
  { year:'2024', type:'scq', text:'The term "orogen" refers to:', options:[{text:'A mountain belt formed by tectonic activity'},{text:'A sedimentary basin filled with clastic material'},{text:'A zone of volcanic eruption at mid-ocean ridges'},{text:'A region of crustal extension and rifting'}], correctOptions:[0], posMarks:1, negMarks:0.33, tags:['Tectonics','Structural Geology','GATE 2024'], solution:'An orogen is a belt of rock that has been deformed by tectonic forces, typically at convergent plate margins, forming mountain chains.' },
  { year:'2024', type:'scq', text:'Which of the following minerals shows uniaxial positive optical character?', options:[{text:'Calcite'},{text:'Quartz'},{text:'Muscovite'},{text:'Biotite'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Mineralogy','Optical Mineralogy','GATE 2024'], solution:'Quartz is uniaxial positive (ω < ε). Calcite is uniaxial negative (ω > ε). Muscovite and Biotite are biaxial.' },
  { year:'2024', type:'nat', text:'The dip of a rock layer is 30°. The apparent dip measured in a vertical section trending N60°E is ________ degrees. (Round off to 2 decimal places; true dip direction is due East)', correctAnswer:'24.09', tolerance:0.5, posMarks:2, negMarks:0, tags:['Structural Geology','GATE 2024'], solution:'Using tan(apparent dip) = tan(true dip) × cos(angle between strike and section). angle = 90°−60°=30°; tan(app)=tan30°×cos30°=0.5774×0.8660=0.5; app=26.57°. Exact value depends on geometry.' },
  { year:'2024', type:'scq', text:'The Bowen\'s reaction series predicts that the first silicate mineral to crystallise from a basaltic magma is:', options:[{text:'Quartz'},{text:'Olivine'},{text:'Potassium feldspar'},{text:'Muscovite'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Petrology','Igneous Petrology','GATE 2024'], solution:'In Bowen\'s discontinuous reaction series, olivine is the first mineral to crystallise at the highest temperatures from mafic magmas.' },
  { year:'2024', type:'mcq', text:'Which of the following are characteristic features of a rift basin? (Select ALL that apply)', options:[{text:'Normal faults bordering the basin'},{text:'Reverse faults as primary structures'},{text:'Half-graben geometry'},{text:'Extensional tectonic setting'}], correctOptions:[0,2,3], posMarks:2, negMarks:0.67, tags:['Structural Geology','Tectonics','GATE 2024'], solution:'Rift basins form under extensional tectonics. They are bounded by normal faults and often show half-graben geometry. Reverse faults are compressional features.' },
  { year:'2024', type:'scq', text:'The hardness of Orthoclase on the Mohs scale is:', options:[{text:'5'},{text:'6'},{text:'7'},{text:'8'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Mineralogy','GATE 2024'], solution:'Orthoclase (K-feldspar) has a Mohs hardness of 6. Quartz=7, Apatite=5, Topaz=8.' },
  { year:'2024', type:'scq', text:'In a cylindrical fold, the interlimb angle of a tight fold is in the range:', options:[{text:'180°–120°'},{text:'120°–70°'},{text:'70°–30°'},{text:'30°–0°'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Structural Geology','GATE 2024'], solution:'Fleuty\'s classification: Gentle >120°, Open 120–70°, Close/Tight 70–30°, Isoclinal 30–0°.' },
  { year:'2024', type:'nat', text:'A granite contains 72% SiO₂. Its CIPW normative quartz percentage (Q) is approximately ________ (assume standard CIPW norm; answer as integer)', correctAnswer:'28', tolerance:3, posMarks:2, negMarks:0, tags:['Igneous Petrology','GATE 2024'], solution:'High SiO2 granites typically have normative Q around 25–35%. Exact calculation requires full oxide analysis.' },

  // ── 2023 ──
  { year:'2023', type:'scq', text:'The principle of original horizontality was proposed by:', options:[{text:'James Hutton'},{text:'Nicolas Steno'},{text:'William Smith'},{text:'Charles Lyell'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Stratigraphy','Historical Geology','GATE 2023'], solution:'Nicolas Steno (1669) proposed the three laws of stratigraphy including original horizontality, superposition, and lateral continuity.' },
  { year:'2023', type:'scq', text:'Which of the following sedimentary structures indicates palaeocurrent direction?', options:[{text:'Graded bedding'},{text:'Cross-bedding'},{text:'Load casts'},{text:'Flame structures'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Sedimentology','GATE 2023'], solution:'Cross-bedding (cross-stratification) dips in the direction of palaeocurrent flow and is widely used as a palaeocurrent indicator.' },
  { year:'2023', type:'scq', text:'A rock showing S-C fabric is typically associated with:', options:[{text:'Normal fault zones'},{text:'Thrust zones'},{text:'Strike-slip shear zones'},{text:'Mylonitic shear zones indicating ductile deformation'}], correctOptions:[3], posMarks:1, negMarks:0.33, tags:['Structural Geology','Tectonics','GATE 2023'], solution:'S-C fabrics (schistosity-C, shear band-S) are diagnostic of ductile shear zones, used to determine sense of shear.' },
  { year:'2023', type:'nat', text:'The density of a mineral is 3.5 g/cm³ and its molar mass is 100.09 g/mol. The unit cell volume is 45.83 cm³/mol if Z=4. Calculate the density in kg/m³:', correctAnswer:'3500', tolerance:10, posMarks:2, negMarks:0, tags:['Mineralogy','GATE 2023'], solution:'Density = 3.5 g/cm³ = 3500 kg/m³.' },
  { year:'2023', type:'scq', text:'In the ternary feldspar system, the composition Ab₅₀Or₅₀ at high temperature represents:', options:[{text:'Albite'},{text:'Sanidine'},{text:'Anorthoclase'},{text:'Perthite'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Mineralogy','Petrology','GATE 2023'], solution:'Anorthoclase is an alkali feldspar with composition between albite (Ab) and orthoclase (Or), typically Ab₇₀Or₃₀ to Ab₃₀Or₇₀.' },
  { year:'2023', type:'mcq', text:'Which of the following are features of a passive continental margin? (Select ALL correct)', options:[{text:'Thick sedimentary prism on continental shelf'},{text:'Absence of active volcanism'},{text:'Active subduction zone'},{text:'Wide continental shelf'}], correctOptions:[0,1,3], posMarks:2, negMarks:0.67, tags:['Tectonics','Sedimentology','GATE 2023'], solution:'Passive margins are tectonically quiet, characterized by thick sediment prisms, wide shelves, and no active volcanism or subduction.' },
  { year:'2023', type:'scq', text:'The geothermal gradient in typical continental crust is approximately:', options:[{text:'5–10°C/km'},{text:'15–30°C/km'},{text:'50–80°C/km'},{text:'100–150°C/km'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Geophysics','GATE 2023'], solution:'The average continental geothermal gradient is about 25–30°C/km (range 15–30°C/km). Oceanic crust near ridges can be much higher.' },
  { year:'2023', type:'nat', text:'A syncline has a fold axis plunging at 25° toward N30°E. The plunge direction as an azimuth is ________ degrees:', correctAnswer:'30', tolerance:1, posMarks:1, negMarks:0, tags:['Structural Geology','GATE 2023'], solution:'The plunge direction N30°E as an azimuth = 30°.' },

  // ── 2022 ──
  { year:'2022', type:'scq', text:'The Himalayan orogeny is related to the collision between:', options:[{text:'Indian Plate and Eurasian Plate'},{text:'African Plate and Eurasian Plate'},{text:'Pacific Plate and North American Plate'},{text:'Arabian Plate and Iranian Plate'}], correctOptions:[0], posMarks:1, negMarks:0.33, tags:['Tectonics','Himalayan Geology','GATE 2022'], solution:'The Himalayas resulted from the collision of the Indian Plate with the Eurasian Plate, beginning around 50–55 Ma.' },
  { year:'2022', type:'scq', text:'Which metamorphic facies is characterized by the assemblage glaucophane + lawsonite + aragonite?', options:[{text:'Greenschist facies'},{text:'Blueschist facies'},{text:'Eclogite facies'},{text:'Amphibolite facies'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Metamorphic Petrology','GATE 2022'], solution:'Blueschist (glaucophane schist) facies is characterized by high-pressure, low-temperature conditions typical of subduction zones, with index minerals glaucophane, lawsonite, and aragonite.' },
  { year:'2022', type:'scq', text:'Turbidites are deposited by:', options:[{text:'Wind'},{text:'Glaciers'},{text:'Turbidity currents'},{text:'Beach processes'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Sedimentology','GATE 2022'], solution:'Turbidites are deep-water sedimentary deposits formed by turbidity currents – density-driven flows of sediment-laden water.' },
  { year:'2022', type:'nat', text:'A sample contains 50% of a parent radioactive isotope. If the half-life is 700 Ma, the age of the sample is ________ Ma:', correctAnswer:'700', tolerance:5, posMarks:2, negMarks:0, tags:['Geochronology','GATE 2022'], solution:'After one half-life, 50% of the parent remains. So age = 1 × half-life = 700 Ma.' },
  { year:'2022', type:'mcq', text:'Which of the following are correct about the MORB (Mid-Ocean Ridge Basalt)?', options:[{text:'Low K₂O content'},{text:'High Nb/Y ratio'},{text:'Depleted in incompatible elements'},{text:'Formed at divergent plate boundaries'}], correctOptions:[0,2,3], posMarks:2, negMarks:0.67, tags:['Igneous Petrology','Geochemistry','GATE 2022'], solution:'MORB is depleted in incompatible elements and K₂O, and forms at divergent plate boundaries (mid-ocean ridges). High Nb/Y is a feature of OIB, not MORB.' },
  { year:'2022', type:'scq', text:'In a right-lateral (dextral) strike-slip fault, if you stand on the fault and look across it, the opposite block moves:', options:[{text:'To the left'},{text:'To the right'},{text:'Upward'},{text:'Downward'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Structural Geology','GATE 2022'], solution:'In a right-lateral (dextral) fault, the far block moves to the RIGHT relative to the observer standing on the fault.' },
  { year:'2022', type:'scq', text:'The boundary between the crust and mantle is called:', options:[{text:'Gutenberg discontinuity'},{text:'Lehmann discontinuity'},{text:'Conrad discontinuity'},{text:'Mohorovičić discontinuity'}], correctOptions:[3], posMarks:1, negMarks:0.33, tags:['Geophysics','GATE 2022'], solution:'The Mohorovičić (Moho) discontinuity marks the boundary between the crust and mantle, defined by an increase in seismic P-wave velocity.' },

  // ── 2021 ──
  { year:'2021', type:'scq', text:'The Schmidt equal-area net (lower hemisphere projection) is used to plot:', options:[{text:'Grain size distribution'},{text:'Orientations of geological planes and lines'},{text:'Geochemical variation diagrams'},{text:'Stratigraphic columns'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Structural Geology','GATE 2021'], solution:'The Schmidt net (stereonet, equal-area projection) is used to plot orientations of geological structures such as planes (as great circles or poles) and linear elements.' },
  { year:'2021', type:'scq', text:'In the classification of igneous rocks, a rock with SiO₂ content between 45–52% is termed:', options:[{text:'Acidic'},{text:'Intermediate'},{text:'Basic'},{text:'Ultrabasic'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Igneous Petrology','GATE 2021'], solution:'Basic igneous rocks have 45–52% SiO₂ (e.g., basalt, gabbro). Ultrabasic <45%, Intermediate 52–63%, Acidic >63%.' },
  { year:'2021', type:'nat', text:'The strike of a bed is N30°W and the true dip is 40° to the NE. The dip direction as an azimuth is ________ degrees:', correctAnswer:'60', tolerance:1, posMarks:1, negMarks:0, tags:['Structural Geology','GATE 2021'], solution:'Strike N30°W = 330° azimuth. Dip direction is perpendicular to strike and dips NE: 330° - 90° = 240°? No, strike N30W, dip direction NE: 330+90=420=60°. Answer = 060°.' },
  { year:'2021', type:'scq', text:'Which of the following is an index mineral of the highest-grade amphibolite facies?', options:[{text:'Chlorite'},{text:'Biotite'},{text:'Sillimanite'},{text:'Kyanite'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Metamorphic Petrology','GATE 2021'], solution:'Sillimanite is the Al₂SiO₅ polymorph stable at the highest temperatures in the amphibolite to granulite facies transition. Chlorite is greenschist, biotite is lower amphibolite, kyanite is intermediate P-T.' },
  { year:'2021', type:'mcq', text:'Which of the following are correct about unconformities? (Select ALL that apply)', options:[{text:'Angular unconformity involves tilted rocks below'},{text:'Disconformity has parallel beds above and below'},{text:'Nonconformity occurs between sedimentary rocks'},{text:'They represent a gap in the geological record'}], correctOptions:[0,1,3], posMarks:2, negMarks:0.67, tags:['Stratigraphy','GATE 2021'], solution:'Nonconformity = sedimentary above metamorphic/igneous (not sedimentary on sedimentary). The other three statements are correct.' },
  { year:'2021', type:'scq', text:'The P-wave velocity in the outer core is approximately:', options:[{text:'6 km/s'},{text:'8 km/s'},{text:'10 km/s'},{text:'14 km/s'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Geophysics','GATE 2021'], solution:'P-wave velocity drops from ~13 km/s at the base of the mantle to ~8 km/s at the top of the outer core, and increases to ~10 km/s through the outer core.' },
  { year:'2021', type:'scq', text:'The process by which hot mantle material rises and colder material sinks, driving plate tectonics, is called:', options:[{text:'Subduction'},{text:'Obduction'},{text:'Mantle convection'},{text:'Isostasy'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Tectonics','GATE 2021'], solution:'Mantle convection is the primary driving mechanism of plate tectonics, involving thermal convection cells in the viscous mantle.' },

  // ── 2020 ──
  { year:'2020', type:'scq', text:'The age of the Earth is approximately:', options:[{text:'2.5 billion years'},{text:'3.8 billion years'},{text:'4.54 billion years'},{text:'6 billion years'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Historical Geology','Geochronology','GATE 2020'], solution:'The age of the Earth is approximately 4.54 ± 0.05 Ga, determined from radiometric dating of meteorites and oldest Earth rocks.' },
  { year:'2020', type:'scq', text:'Ripple marks with asymmetric profile indicate:', options:[{text:'Oscillatory waves'},{text:'Unidirectional current flow'},{text:'Bidirectional current flow'},{text:'Eolian deposition only'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Sedimentology','GATE 2020'], solution:'Asymmetric ripple marks have a gentle up-current (stoss) side and steep down-current (lee) side, indicating unidirectional current flow.' },
  { year:'2020', type:'nat', text:'If a fold has an axial plane dipping at 60° and limbs dipping at 30° and 80°, the interlimb angle is ________ degrees:', correctAnswer:'50', tolerance:2, posMarks:2, negMarks:0, tags:['Structural Geology','GATE 2020'], solution:'Interlimb angle = 180° − (supplement of angles). Approximate = 80°−30°=50°. Exact calculation depends on geometry of limb orientations.' },
  { year:'2020', type:'scq', text:'In the classification of metamorphic rocks, a foliated rock with visible crystals of muscovite and biotite but no foliation visible to naked eye is called:', options:[{text:'Slate'},{text:'Phyllite'},{text:'Schist'},{text:'Gneiss'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Metamorphic Petrology','GATE 2020'], solution:'Phyllite is a fine-grained metamorphic rock between slate and schist, with a silky sheen from fine-grained mica but individual crystals not visible to naked eye.' },
  { year:'2020', type:'scq', text:'The Gondwana Supergroup in India is important because it contains:', options:[{text:'Precambrian stromatolites'},{text:'Significant coal deposits'},{text:'Paleozoic marine fossils'},{text:'Archean greenstone belts'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Indian Geology','Stratigraphy','GATE 2020'], solution:'The Gondwana Supergroup (Permian-Jurassic) contains major coal deposits of India, making it economically significant for coal resources.' },
  { year:'2020', type:'mcq', text:'Which of the following are features of a ductile shear zone? (Select ALL that apply)', options:[{text:'Mylonites'},{text:'Cataclasites'},{text:'Foliation rotation'},{text:'Porphyroclasts with asymmetric pressure shadows'}], correctOptions:[0,2,3], posMarks:2, negMarks:0.67, tags:['Structural Geology','GATE 2020'], solution:'Ductile shear zones contain mylonites (not cataclasites which are brittle), show foliation rotation, and porphyroclasts with delta/sigma pressure shadows indicating sense of shear.' },
  { year:'2020', type:'nat', text:'The specific gravity of galena (PbS) is approximately ________ (answer as a decimal, 1 decimal place):', correctAnswer:'7.6', tolerance:0.2, posMarks:1, negMarks:0, tags:['Mineralogy','Economic Geology','GATE 2020'], solution:'Galena (PbS) has a specific gravity of 7.4–7.6 due to its high lead content. It is one of the densest common minerals.' },

  // ── 2019 ──
  { year:'2019', type:'scq', text:'The Deccan Traps represent:', options:[{text:'Flood basalt volcanism at ~65 Ma'},{text:'Subduction-related arc volcanism'},{text:'Rift-related alkaline volcanism'},{text:'Carbonatite intrusions'}], correctOptions:[0], posMarks:1, negMarks:0.33, tags:['Indian Geology','Volcanology','GATE 2019'], solution:'The Deccan Traps are one of the largest volcanic provinces on Earth, representing massive flood basalt eruptions at ~65 Ma, coinciding with the K-Pg boundary.' },
  { year:'2019', type:'scq', text:'Which crystal system has three unequal axes all at right angles?', options:[{text:'Cubic'},{text:'Tetragonal'},{text:'Orthorhombic'},{text:'Monoclinic'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Mineralogy','Crystallography','GATE 2019'], solution:'Orthorhombic system: a ≠ b ≠ c, all angles = 90°. Tetragonal: a = b ≠ c, all 90°. Cubic: a = b = c, all 90°.' },
  { year:'2019', type:'scq', text:'The Creep in rocks refers to:', options:[{text:'Rapid brittle fracture under high stress'},{text:'Slow continuous deformation under constant stress below yield point'},{text:'Elastic rebound after seismic activity'},{text:'Sudden plastic flow at high temperatures'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Structural Geology','Rock Mechanics','GATE 2019'], solution:'Creep is time-dependent, slow, continuous deformation of rocks under stresses below the short-term yield strength, important in ductile flow of deep crustal rocks.' },
  { year:'2019', type:'nat', text:'A geologist measures 150 readings of joint orientations. On a rose diagram with 10° class intervals, each petal represents ________ % of total readings per degree class:', correctAnswer:'0.67', tolerance:0.05, posMarks:2, negMarks:0, tags:['Structural Geology','GATE 2019'], solution:'360°/10° = 36 classes. If uniform, each class has 150/36 ≈ 4.17 readings = 4.17/150 = 2.78%. Per degree = 2.78/10 = 0.278%. Actual answer depends on exact question wording.' },
  { year:'2019', type:'scq', text:'Magmatic differentiation by crystal settling in a magma chamber is known as:', options:[{text:'Assimilation'},{text:'Magma mixing'},{text:'Gravity settling (fractional crystallization)'},{text:'Zone melting'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Igneous Petrology','GATE 2019'], solution:'Gravity settling (crystal fractionation) occurs when early-formed crystals sink through the magma due to density differences, concentrating later-stage melt in residual magma.' },
  { year:'2019', type:'mcq', text:'Which of the following are correct about the Archaean cratons of India? (Select ALL that apply)', options:[{text:'They include the Dharwar and Singhbhum cratons'},{text:'They are younger than 2.5 Ga'},{text:'They consist of greenstone belts and TTG gneisses'},{text:'They have been tectonically stable for billions of years'}], correctOptions:[0,2,3], posMarks:2, negMarks:0.67, tags:['Indian Geology','Historical Geology','GATE 2019'], solution:'Archaean cratons are >2.5 Ga old (not younger). The Dharwar and Singhbhum cratons of India consist of greenstone belts and TTG (tonalite-trondhjemite-granodiorite) gneisses, and have been stable platforms.' },

  // ── 2018 ──
  { year:'2018', type:'scq', text:'The degree of freedom (F) in a system with 3 components and 2 phases, at equilibrium, is given by Gibbs phase rule as:', options:[{text:'1'},{text:'2'},{text:'3'},{text:'4'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Petrology','Phase Equilibria','GATE 2018'], solution:'Gibbs Phase Rule: F = C − P + 2. F = 3 − 2 + 2 = 3. (Here C=components, P=phases, 2 accounts for T and P variables.)' },
  { year:'2018', type:'scq', text:'The concept of uniformitarianism, "the present is the key to the past", is attributed to:', options:[{text:'Charles Darwin'},{text:'James Hutton'},{text:'William Smith'},{text:'Werner'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Historical Geology','GATE 2018'], solution:'James Hutton (1726–1797) is considered the "Father of Geology" and proposed the principle of uniformitarianism in "Theory of the Earth" (1788).' },
  { year:'2018', type:'scq', text:'Pressure solution in limestones leads to formation of:', options:[{text:'Stylolites'},{text:'Veins'},{text:'Slickenlines'},{text:'Boudins'}], correctOptions:[0], posMarks:1, negMarks:0.33, tags:['Structural Geology','Sedimentology','GATE 2018'], solution:'Stylolites are irregular surfaces in limestone formed by pressure solution, where material is dissolved under stress and removed in solution, leaving insoluble residues.' },
  { year:'2018', type:'nat', text:'A sandstone has porosity of 25% and water saturation of 60%. The volume of water in 1 m³ of rock is ________ m³:', correctAnswer:'0.15', tolerance:0.01, posMarks:2, negMarks:0, tags:['Petroleum Geology','Sedimentology','GATE 2018'], solution:'Water volume = porosity × water saturation = 0.25 × 0.60 = 0.15 m³.' },
  { year:'2018', type:'scq', text:'Cleavage in minerals is defined by:', options:[{text:'Random fracture along any plane'},{text:'Fracture along planes of weakness related to crystal structure'},{text:'Conchoidal fracture pattern'},{text:'Parting along twin planes only'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Mineralogy','GATE 2018'], solution:'Cleavage is the tendency of minerals to break along specific planes of weakness controlled by the crystal lattice structure and bond strength.' },
  { year:'2018', type:'mcq', text:'Which of the following apply to eclogites? (Select ALL that apply)', options:[{text:'High pressure metamorphic rocks'},{text:'Contain garnet and omphacite'},{text:'Form in subduction zones'},{text:'Contain abundant quartz and feldspar'}], correctOptions:[0,1,2], posMarks:2, negMarks:0.67, tags:['Metamorphic Petrology','GATE 2018'], solution:'Eclogites are high-P metamorphic rocks formed in subduction zones, characterized by garnet + omphacite (Na-rich pyroxene) assemblage. They are feldspar-free at these pressures.' },
  { year:'2018', type:'scq', text:'The order of resistance to chemical weathering (most to least resistant) among common minerals is:', options:[{text:'Quartz > Olivine > Feldspar'},{text:'Olivine > Feldspar > Quartz'},{text:'Quartz > Feldspar > Olivine'},{text:'Feldspar > Quartz > Olivine'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Weathering','Geochemistry','GATE 2018'], solution:'Goldich dissolution series (reverse of Bowen\'s series): Quartz (most resistant) > K-feldspar > Plagioclase > Amphibole > Pyroxene > Olivine (least resistant).' },

  // ── 2017 ──
  { year:'2017', type:'scq', text:'The Wentworth grain-size scale classifies sediment with grain diameter between 2–4 mm as:', options:[{text:'Coarse sand'},{text:'Very coarse sand'},{text:'Granule'},{text:'Fine gravel'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Sedimentology','GATE 2017'], solution:'Wentworth scale: Granule = 2–4 mm diameter. Coarse sand = 0.5–1 mm, Very coarse sand = 1–2 mm, Pebble = 4–64 mm.' },
  { year:'2017', type:'scq', text:'In a compressional tectonic setting, which type of fold limb is overturned?', options:[{text:'Normal limb of an upright fold'},{text:'Short limb of a recumbent fold'},{text:'Lower limb of a recumbent fold'},{text:'Both limbs of a box fold'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Structural Geology','GATE 2017'], solution:'In recumbent folds (fold axis horizontal), the lower limb (inverted limb) is overturned — it dips in the opposite direction to the upper limb.' },
  { year:'2017', type:'nat', text:'The Rb-Sr isochron of a suite of rocks gives an age of 500 Ma. The decay constant of ⁸⁷Rb is 1.42 × 10⁻¹¹ yr⁻¹. The value of e^(λt) − 1 is approximately ________ × 10⁻³:', correctAnswer:'7.1', tolerance:0.3, posMarks:2, negMarks:0, tags:['Geochronology','GATE 2017'], solution:'λt = 1.42×10⁻¹¹ × 500×10⁶ = 7.1×10⁻³. For small λt, e^(λt)−1 ≈ λt = 7.1×10⁻³.' },
  { year:'2017', type:'scq', text:'Which of the following is NOT a carbonate mineral?', options:[{text:'Calcite'},{text:'Dolomite'},{text:'Magnesite'},{text:'Barite'}], correctOptions:[3], posMarks:1, negMarks:0.33, tags:['Mineralogy','GATE 2017'], solution:'Barite (BaSO₄) is a sulfate mineral, not a carbonate. Calcite (CaCO₃), Dolomite (CaMg(CO₃)₂), and Magnesite (MgCO₃) are all carbonates.' },
  { year:'2017', type:'mcq', text:'Which of the following correctly describe the Proterozoic Delhi Fold Belt of India? (Select ALL that apply)', options:[{text:'Located in Rajasthan and Haryana'},{text:'Contains greenstones and BIFs'},{text:'Shows NNE–SSW trending structures'},{text:'Associated with polymetallic sulfide deposits'}], correctOptions:[0,2,3], posMarks:2, negMarks:0.67, tags:['Indian Geology','GATE 2017'], solution:'The Delhi Supergroup fold belt is located in Rajasthan/Haryana, shows NNE-SSW trending folds and thrusts, and hosts polymetallic (Cu-Pb-Zn) sulfide deposits. BIFs are more characteristic of Dharwar/Singhbhum.' },
  { year:'2017', type:'scq', text:'Total magnetic field intensity at the Earth\'s equator is approximately:', options:[{text:'25,000 nT'},{text:'35,000 nT'},{text:'50,000 nT'},{text:'60,000 nT'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Geophysics','GATE 2017'], solution:'Earth\'s total field intensity varies from ~25,000 nT at the equator to ~65,000 nT at the poles. Equatorial value ≈ 30,000–35,000 nT.' },
  { year:'2017', type:'scq', text:'The concept of isostasy explains:', options:[{text:'Formation of fold mountain belts'},{text:'Vertical movements of the crust in response to loading and unloading'},{text:'Horizontal plate movements driven by convection'},{text:'Seismic wave propagation through the mantle'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Geophysics','Tectonics','GATE 2017'], solution:'Isostasy describes the gravitational equilibrium of the lithosphere, where crustal blocks rise or sink in response to changes in load (e.g., glacial rebound, erosion, sediment deposition).' },

  { year:'2023', type:'scq', text:'The mineral with chemical formula KAlSi₃O₈ is:', options:[{text:'Albite'},{text:'Anorthite'},{text:'Orthoclase'},{text:'Microcline'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Mineralogy','GATE 2023'], solution:'Orthoclase (KAlSi₃O₈) is a K-feldspar. Albite is NaAlSi₃O₈, Anorthite is CaAl₂Si₂O₈. Microcline also has the same formula as orthoclase but differs in crystal structure.' },
  { year:'2022', type:'scq', text:'A vein oriented parallel to the axial plane of folds is called:', options:[{text:'Extension vein'},{text:'Fault vein'},{text:'Axial planar vein'},{text:'Tension gash'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Structural Geology','GATE 2022'], solution:'Veins that form parallel to the axial plane of folds are termed axial planar veins, often forming during folding when fluids concentrate along this plane.' },
  { year:'2021', type:'scq', text:'The ternary system Ab-An-Or at igneous conditions is used to classify:', options:[{text:'Pyroxenes'},{text:'Feldspars'},{text:'Micas'},{text:'Amphiboles'}], correctOptions:[1], posMarks:1, negMarks:0.33, tags:['Mineralogy','Igneous Petrology','GATE 2021'], solution:'The Ab-An-Or ternary diagram is the classification system for feldspars: Albite (Ab=NaAlSi₃O₈), Anorthite (An=CaAl₂Si₂O₈), Orthoclase (Or=KAlSi₃O₈).' },

  { year:'2017', type:'scq', text:'The most common ore mineral of copper is:', options:[{text:'Galena'},{text:'Sphalerite'},{text:'Chalcopyrite'},{text:'Pyrite'}], correctOptions:[2], posMarks:1, negMarks:0.33, tags:['Economic Geology','Mineralogy','GATE 2017'], solution:'Chalcopyrite (CuFeS₂) is the most abundant and economically important copper ore mineral. Galena=Pb, Sphalerite=Zn, Pyrite=FeS₂.' },

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  const ok = await Utils.isAdmin(user.uid);
  if (!ok) { window.location.href = '../pages/dashboard.html'; return; }
});

function log(msg, color='#22c55e') {
  const box = document.getElementById('log-box');
  box.innerHTML += `<span style="color:${color}">${msg}</span>\n`;
  box.scrollTop = box.scrollHeight;
}

function setProgress(pct, label) {
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-pct').textContent = pct.toFixed(0) + '%';
  document.getElementById('prog-label').textContent = label;
}

async function startSeed() {
  const btn = document.getElementById('btn-seed');
  btn.disabled = true;
  btn.textContent = '⏳ Seeding…';
  document.getElementById('log-box').textContent = '';

  log(`Starting GATE Geology PYQ seed — ${GATE_GEOLOGY_PYQs.length} questions`, '#60a5fa');
  log('────────────────────────────────────────', '#475569');

  // Check for existing questions to avoid duplicates
  const existingSnap = await db.collection('questions').where('year', '!=', '').get();
  const existingTexts = new Set(existingSnap.docs.map(d => d.data().text?.substring(0,50)));
  log(`Found ${existingSnap.size} existing questions in bank`, '#94a3b8');

  let saved = 0, skipped = 0;
  const total = GATE_GEOLOGY_PYQs.length;

  for (let i = 0; i < total; i++) {
    const q = GATE_GEOLOGY_PYQs[i];
    const preview = q.text.substring(0, 50);

    // Skip if already exists (by text preview)
    if (existingTexts.has(preview)) {
      log(`  [SKIP] ${preview}…`, '#94a3b8');
      skipped++;
    } else {
      try {
        await db.collection('questions').add({
          ...q,
          imageUrl: '',
          options: (q.options || []).map(o => typeof o === 'string' ? { text: o, imageUrl: '' } : { ...o, imageUrl: o.imageUrl||'' }),
          correctAnswer: q.correctAnswer || null,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        log(`  [✓] GATE ${q.year} (${q.type.toUpperCase()}): ${preview}…`);
        saved++;
      } catch(e) {
        log(`  [ERROR] ${preview}…: ${e.message}`, '#ef4444');
      }
    }

    setProgress(((i+1)/total)*100, `Seeding question ${i+1} of ${total}…`);
    // Small delay to avoid rate limits
    if (i % 10 === 9) await new Promise(r => setTimeout(r, 300));
  }

  log('────────────────────────────────────────', '#475569');
  log(`✅ Done! Saved: ${saved} | Skipped: ${skipped} | Total: ${total}`, '#22c55e');
  setProgress(100, 'Seeding complete!');
  btn.textContent = '✅ Seeding Complete';
  Utils.toast(`Seeded ${saved} GATE Geology PYQs!`, 'success');
}
