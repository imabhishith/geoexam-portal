<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View Student Attempt — Admin</title>
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body { background: var(--bg); }
    .page-wrap { max-width: 1400px; margin: 0 auto; padding: 24px 24px; }

    /* ── Header ── */
    .attempt-header {
      background: linear-gradient(135deg, #0f2545 0%, #1a3c6e 60%, #2563ab 100%);
      border-radius: 16px;
      padding: 28px 32px;
      color: #fff;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 20px;
    }
    .attempt-header h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .attempt-header .meta { font-size: 13px; opacity: .8; margin-top: 6px; display: flex; flex-wrap: wrap; gap: 16px; }
    .attempt-header .meta span { display: flex; align-items: center; gap: 5px; }

    /* ── Score Summary ── */
    .score-summary {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    .score-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px 14px;
      text-align: center;
    }
    .score-box .num {
      font-size: 26px;
      font-weight: 800;
      font-family: 'Rajdhani';
      line-height: 1;
      margin-bottom: 4px;
    }
    .score-box .lbl { font-size: 11px; color: var(--text2); font-weight: 600; text-transform: uppercase; }
    .score-box.total .num { color: var(--primary); }
    .score-box.correct .num { color: var(--success); }
    .score-box.wrong .num { color: var(--danger); }
    .score-box.partial .num { color: var(--warning); }
    .score-box.skipped .num { color: var(--text2); }

    /* ── Filters ── */
    .filter-bar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 20px;
      align-items: center;
    }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 2px solid var(--border);
      background: var(--surface);
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s;
      color: var(--text2);
    }
    .filter-btn.active { border-color: var(--primary); background: var(--primary); color: #fff; }
    .filter-btn:hover:not(.active) { border-color: var(--primary); color: var(--primary); }

    /* ── Question cards ── */
    .q-list { display: flex; flex-direction: column; gap: 14px; }
    .q-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }
    .q-card.correct  { border-left: 4px solid var(--success); }
    .q-card.wrong    { border-left: 4px solid var(--danger); }
    .q-card.partial  { border-left: 4px solid var(--warning); }
    .q-card.skipped  { border-left: 4px solid var(--text3); }

    .q-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 18px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 8px;
    }
    .q-num-badge {
      font-size: 12px;
      font-weight: 700;
      color: var(--text2);
      background: var(--bg2);
      padding: 3px 10px;
      border-radius: 20px;
    }
    .q-result-badge {
      font-size: 12px;
      font-weight: 800;
      padding: 4px 12px;
      border-radius: 20px;
    }
    .q-result-badge.correct { background: #dcfce7; color: #15803d; }
    .q-result-badge.wrong   { background: #fee2e2; color: #991b1b; }
    .q-result-badge.partial { background: #fef9c3; color: #92400e; }
    .q-result-badge.skipped { background: var(--bg2); color: var(--text2); }

    .q-card-body { padding: 16px 18px; }
    .q-text {
      font-size: 14px;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 14px;
    }
    .q-text img { max-width: 100%; border-radius: 8px; margin-top: 8px; }

    /* ── Options ── */
    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    .option-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1.5px solid var(--border);
      font-size: 13px;
      background: var(--surface);
    }
    .option-row.selected-correct { background: #dcfce7; border-color: var(--success); }
    .option-row.selected-wrong   { background: #fee2e2; border-color: var(--danger); }
    .option-row.correct-answer   { background: #dcfce7; border-color: var(--success); }
    .option-row.missed-correct   { background: #fef9c3; border-color: var(--warning); border-style: dashed; }
    .opt-letter {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: var(--bg2);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 800;
      flex-shrink: 0;
    }
    .opt-letter.correct-bg { background: var(--success); color: #fff; }
    .opt-letter.wrong-bg   { background: var(--danger); color: #fff; }

    /* NAT answer */
    .nat-answer {
      display: flex;
      gap: 20px;
      font-size: 13px;
      margin-bottom: 10px;
    }
    .nat-box {
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 700;
    }
    .nat-box.student { background: #dbeafe; color: #1d4ed8; border: 1.5px solid #93c5fd; }
    .nat-box.correct { background: #dcfce7; color: #15803d; border: 1.5px solid #86efac; }

    /* ── Score chip ── */
    .score-chip {
      font-size: 14px;
      font-weight: 800;
      font-family: 'Rajdhani';
    }
    .score-chip.positive { color: var(--success); }
    .score-chip.negative { color: var(--danger); }
    .score-chip.zero     { color: var(--text2); }

    /* ── Loading / Empty ── */
    .loading-block { text-align: center; padding: 60px; color: var(--text2); }
    .loading-block .spinner { margin: 0 auto 16px; }

    /* ── Back bar ── */
    .back-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
      padding: 10px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    @media (max-width: 700px) {
      .score-summary { grid-template-columns: repeat(3,1fr); }
      .options-grid  { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .score-summary { grid-template-columns: repeat(2,1fr); }
    }
  </style>
</head>
<body>

<!-- ── Navbar ── -->
<nav class="navbar">
  <div class="navbar-brand">
    <span style="font-size:26px;"><i class="fas fa-gem"></i></span>
    <div>
      <h1>GeoExam Admin</h1>
      <span>Attempt Viewer</span>
    </div>
  </div>
  <div class="navbar-nav">
    <a href="index.html" class="nav-link"><i class="fas fa-th-large"></i> Admin Panel</a>
    <a href="index.html#attempts" class="nav-link"><i class="fas fa-list-alt"></i> All Attempts</a>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="color:rgba(255,255,255,.8)"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</nav>

<div class="page-wrap">

  <div class="back-bar">
    <a href="index.html" class="btn btn-outline btn-sm">
      <i class="fas fa-arrow-left"></i> Back to Admin Panel
    </a>
    <span style="font-size:13px;color:var(--text2);"><i class="fas fa-shield-alt" style="color:var(--primary);margin-right:4px;"></i> Admin &rsaquo; Attempt Viewer</span>
  </div>

  <!-- Header populated by JS -->
  <div class="attempt-header" id="attempt-header">
    <div>
      <div class="spinner" style="width:24px;height:24px;border-width:2px;"></div>
    </div>
  </div>

  <!-- Score Summary -->
  <div class="score-summary" id="score-summary">
    <!-- populated by JS -->
  </div>

  <!-- Time Analysis Banner -->
  <div id="time-analysis-section" style="display:none;background:#fff;border:1px solid #e2e8f0;border-radius:14px;margin-bottom:20px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);">
    <div style="padding:14px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between;background:#f8fafc;">
      <h3 style="font-size:15px;font-weight:800;color:#0a2540;font-family:'Rajdhani',sans-serif;display:flex;align-items:center;gap:8px;">
        <i class="fas fa-clock" style="color:#1565c0;"></i> Time Spent per Question
      </h3>
      <div style="display:flex;align-items:center;gap:16px;">
        <span style="font-size:11px;font-weight:700;color:#64748b;background:#e2e8f0;padding:3px 10px;border-radius:10px;">
          <i class="fas fa-hourglass-half"></i> <span id="time-total-label"></span>
        </span>
        <div style="display:flex;align-items:center;gap:10px;font-size:11px;font-weight:700;">
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#22c55e;display:inline-block;"></span>Correct</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;"></span>Wrong</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#f59e0b;display:inline-block;"></span>Partial</span>
          <span style="display:flex;align-items:center;gap:4px;"><span style="width:10px;height:10px;border-radius:50%;background:#94a3b8;display:inline-block;"></span>Skipped</span>
        </div>
      </div>
    </div>
    <div style="padding:16px 20px;" id="time-bars-container"></div>
    <div style="padding:0 20px 14px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;" id="time-summary-boxes"></div>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <span style="font-size:13px;font-weight:600;color:var(--text2);">Show:</span>
    <button class="filter-btn active" onclick="setFilter('all',this)">All <span id="fc-all" class="badge badge-muted" style="margin-left:4px;"></span></button>
    <button class="filter-btn" onclick="setFilter('correct',this)" style="border-color:var(--success);color:var(--success);">
      <i class="fas fa-check-circle"></i> Correct <span id="fc-correct" class="badge" style="background:#dcfce7;color:#15803d;margin-left:4px;"></span>
    </button>
    <button class="filter-btn" onclick="setFilter('wrong',this)" style="border-color:var(--danger);color:var(--danger);">
      <i class="fas fa-times-circle"></i> Wrong <span id="fc-wrong" class="badge" style="background:#fee2e2;color:#991b1b;margin-left:4px;"></span>
    </button>
    <button class="filter-btn" onclick="setFilter('partial',this)" style="border-color:var(--warning);color:var(--warning);">
      <i class="fas fa-adjust"></i> Partial <span id="fc-partial" class="badge" style="background:#fef9c3;color:#92400e;margin-left:4px;"></span>
    </button>
    <button class="filter-btn" onclick="setFilter('skipped',this)" style="border-color:var(--text3);color:var(--text3);">
      <i class="fas fa-minus-circle"></i> Skipped <span id="fc-skipped" class="badge badge-muted" style="margin-left:4px;"></span>
    </button>
  </div>

  <!-- Question list -->
  <div id="q-list" class="q-list">
    <div class="loading-block">
      <div class="spinner"></div>
      <p>Loading attempt data…</p>
    </div>
  </div>

</div>

<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>

const params      = new URLSearchParams(location.search);
const attemptId   = params.get('id');
let renderedItems = [];   // { result, card HTML }
let currentFilter = 'all';

// ── Auth Guard (admin only) ──
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  const ok = await Utils.isAdmin(user.uid);
  if (!ok) { window.location.href = '../pages/dashboard.html'; return; }
  if (!attemptId) {
    document.getElementById('q-list').innerHTML =
      `<div class="loading-block"><i class="fas fa-exclamation-triangle" style="font-size:36px;color:var(--danger)"></i><p style="margin-top:12px;color:var(--danger);">No attempt ID specified.</p></div>`;
    return;
  }
  loadAttempt();
});

// ── Helpers ──
function formatQTime(secs) {
  if (!secs || secs < 1) return '< 1s';
  if (secs < 60) return secs + 's';
  const m = Math.floor(secs / 60), s = secs % 60;
  return s > 0 ? `${m}m ${s}s` : `${m}m`;
}

// ── Load & render ──
async function loadAttempt() {
  try {
    // 1. Fetch attempt
    const attDoc = await db.collection('attempts').doc(attemptId).get();
    if (!attDoc.exists) throw new Error('Attempt not found');
    const attempt = { id: attDoc.id, ...attDoc.data() };

    // 2. Fetch student info
    let student = { firstName: 'Student', lastName: '', email: '' };
    try {
      const ud = await db.collection('users').doc(attempt.userId).get();
      if (ud.exists) student = ud.data();
    } catch(e) {}

    // 3. Fetch questions
    const qIds = Object.keys(attempt.answers || {});
    // Also try to get from exam's question order if available
    let orderedIds = qIds;
    try {
      const examDoc = await db.collection('exams').doc(attempt.examId).get();
      if (examDoc.exists && examDoc.data().questionIds?.length) {
        orderedIds = examDoc.data().questionIds.filter(id => qIds.includes(id));
        // append any answered but not in exam order (edge case)
        qIds.forEach(id => { if (!orderedIds.includes(id)) orderedIds.push(id); });
      }
    } catch(e) {}

    const qDocs = await Promise.all(orderedIds.map(id => db.collection('questions').doc(id).get()));
    const questionMap = {};
    qDocs.forEach(d => { if (d.exists) questionMap[d.id] = { id: d.id, ...d.data() }; });

    // ── Render header ──
    const fullName = `${student.firstName} ${student.lastName}`.trim();
    const submitDate = attempt.submittedAt?.toDate?.()?.toLocaleString('en-IN',{
      day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'
    }) || '—';
    const score = attempt.totalScore || 0;
    const max   = attempt.maxScore   || 0;
    const pct   = max > 0 ? (score/max*100).toFixed(1) : 0;
    const pctColor = pct >= 65 ? '#22c55e' : pct >= 40 ? '#f59e0b' : '#ef4444';

    document.getElementById('attempt-header').innerHTML = `
      <div>
        <h1><i class="fas fa-user-graduate"></i> ${fullName}</h1>
        <div style="font-size:15px;opacity:.85;margin-bottom:10px;">${student.email}</div>
        <div class="meta">
          <span><i class="fas fa-clipboard-list"></i> ${attempt.examTitle||'Exam'}</span>
          <span><i class="fas fa-calendar-alt"></i> ${submitDate}</span>
          <span><i class="fas fa-id-badge"></i> <span style="font-family:monospace;font-size:11px;">${attemptId}</span></span>
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:48px;font-weight:900;font-family:'Rajdhani';color:#fff;line-height:1;">${score.toFixed(2)}</div>
        <div style="font-size:15px;opacity:.7;">out of ${max}</div>
        <div style="margin-top:6px;">
          <span style="background:rgba(255,255,255,.2);padding:5px 14px;border-radius:20px;font-weight:700;font-size:14px;color:${pctColor};">${pct}%</span>
        </div>
      </div>`;

    // ── Score summary boxes ──
    document.getElementById('score-summary').innerHTML = `
      <div class="score-box total">
        <div class="num">${score.toFixed(2)}</div>
        <div class="lbl">Total Score</div>
      </div>
      <div class="score-box correct">
        <div class="num">${attempt.correct||0}</div>
        <div class="lbl">Correct</div>
      </div>
      <div class="score-box wrong">
        <div class="num">${attempt.wrong||0}</div>
        <div class="lbl">Wrong</div>
      </div>
      <div class="score-box partial">
        <div class="num">${attempt.partial||0}</div>
        <div class="lbl">Partial</div>
      </div>
      <div class="score-box skipped">
        <div class="num">${attempt.skipped||0}</div>
        <div class="lbl">Skipped</div>
      </div>`;

    // ── Build question items ──
    renderedItems = [];
    let counts = { correct:0, wrong:0, partial:0, skipped:0 };

    orderedIds.forEach((qid, idx) => {
      const q   = questionMap[qid];
      const ans = attempt.answers?.[qid] || {};
      const ev  = attempt.evaluation?.[qid] || {};

      if (!q) return;

      const result = ev.result || (ans.selected?.length === 0 && ans.nat == null ? 'skipped' : 'skipped');
      const qScore = ev.score || 0;
      if (counts[result] !== undefined) counts[result]++;

      const scoreColor = qScore > 0 ? 'positive' : qScore < 0 ? 'negative' : 'zero';
      const scoreTxt   = qScore > 0 ? `+${qScore.toFixed(2)}` : qScore.toFixed(2);

      let optionsHtml = '';
      const type = q.type || 'scq';

      if (type === 'nat') {
        const stuAns = ans.natValue != null ? ans.natValue : (ans.selected?.[0] ?? '—');
        const corAns = ev.correct?.[0] ?? q.correctNat ?? '—';
        optionsHtml = `<div class="nat-answer">
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:4px;">Student's Answer</div>
            <div class="nat-box student">${stuAns}</div>
          </div>
          <div>
            <div style="font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;margin-bottom:4px;">Correct Answer</div>
            <div class="nat-box correct">${corAns}</div>
          </div>
        </div>`;
      } else {
        const options  = q.options || [];
        const selected = new Set(ans.selected || []);
        const correct  = new Set(ev.correct || q.correctOptions || []);
        const letters  = ['A','B','C','D','E','F'];

        optionsHtml = `<div class="options-grid">`;
        options.forEach((opt, oi) => {
          const letter = letters[oi] || oi;
          const isSelected = selected.has(oi) || selected.has(String(oi));
          const isCorrect  = correct.has(oi)  || correct.has(String(oi));

          let rowClass = '';
          let letClass = '';
          let icon = '';

          if (isSelected && isCorrect) {
            rowClass = 'selected-correct';
            letClass = 'correct-bg';
            icon = ' <i class="fas fa-check" style="color:var(--success);margin-left:4px;"></i>';
          } else if (isSelected && !isCorrect) {
            rowClass = 'selected-wrong';
            letClass = 'wrong-bg';
            icon = ' <i class="fas fa-times" style="color:var(--danger);margin-left:4px;"></i>';
          } else if (!isSelected && isCorrect) {
            rowClass = 'missed-correct';
            icon = ' <i class="fas fa-check-double" style="color:var(--warning);margin-left:4px;" title="Correct answer (not selected)"></i>';
          }

          const optText = typeof opt === 'object' ? (opt.text || '') : opt;
          const optImg  = typeof opt === 'object' ? opt.image : null;

          optionsHtml += `<div class="option-row ${rowClass}">
            <div class="opt-letter ${letClass}">${letter}</div>
            <div style="flex:1;">
              ${optText}${icon}
              ${optImg ? `<img src="${optImg}" style="max-height:60px;border-radius:4px;margin-top:6px;">` : ''}
            </div>
          </div>`;
        });
        optionsHtml += `</div>`;
      }

      // Section info
      const sectionInfo = q.section ? `<span style="background:var(--bg2);padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;color:var(--text2);">${q.section}</span>` : '';

      const cardHtml = `
        <div class="q-card ${result}" data-result="${result}">
          <div class="q-card-header">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
              <span class="q-num-badge">Q${idx+1}</span>
              <span class="badge ${q.type==='scq'?'badge-info':q.type==='mcq'?'badge-warning':'badge-primary'}">${(q.type||'SCQ').toUpperCase()}</span>
              ${sectionInfo}
              ${q.year ? `<span style="font-size:11px;color:var(--text2);">${q.year}</span>` : ''}
            </div>
            <div style="display:flex;align-items:center;gap:10px;">
              ${attempt.timeSpent && attempt.timeSpent[qid] ? `<span style="font-size:11px;color:#64748b;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:12px;padding:3px 10px;"><i class="fas fa-clock"></i> ${formatQTime(attempt.timeSpent[qid])}</span>` : ''}
              <span class="score-chip ${scoreColor}">${scoreTxt} pts</span>
              <span class="q-result-badge ${result}">${result.charAt(0).toUpperCase()+result.slice(1)}</span>
            </div>
          </div>
          <div class="q-card-body">
            <div class="q-text">
              ${q.text || ''}
              ${q.imageUrl ? `<br><img src="${q.imageUrl}" style="max-width:100%;border-radius:8px;margin-top:8px;">` : ''}
            </div>
            ${optionsHtml}
            ${q.explanation ? `
              <div style="background:#f0fdf4;border:1px solid #86efac;border-radius:8px;padding:12px 14px;margin-top:10px;font-size:13px;color:var(--text);">
                <strong style="color:var(--success);display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                  <i class="fas fa-lightbulb"></i> Explanation
                </strong>
                ${q.explanation}
              </div>` : ''}
          </div>
        </div>`;

      renderedItems.push({ result, html: cardHtml });
    });

    // ── Render Time Analysis ──
    if (attempt.timeSpent && Object.keys(attempt.timeSpent).length > 0) {
      const taSection = document.getElementById('time-analysis-section');
      const barsContainer = document.getElementById('time-bars-container');
      taSection.style.display = 'block';
      const tData = orderedIds.map((qid, idx) => ({
        qid, idx: idx+1, secs: attempt.timeSpent[qid] || 0
      })).filter(d => d.secs > 0);
      const maxSecs = Math.max(...tData.map(d => d.secs), 1);
      const totalSecs = tData.reduce((s, d) => s + d.secs, 0);
      document.getElementById('time-total-label').textContent = 'Total tracked: ' + formatQTime(totalSecs);
      barsContainer.innerHTML = tData.map(d => {
        const ev = attempt.evaluation?.[d.qid] || {};
        const result = ev.result || 'skipped';
        const colors = {correct:'#22c55e',wrong:'#ef4444',partial:'#f59e0b',skipped:'#94a3b8'};
        const pct = Math.round((d.secs / maxSecs) * 100);
        return `<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px;font-size:12px;">
          <div style="width:32px;text-align:right;color:#64748b;font-weight:700;flex-shrink:0;font-family:'Rajdhani',sans-serif;">Q${d.idx}</div>
          <div style="flex:1;background:#f1f5f9;border-radius:4px;overflow:hidden;height:14px;position:relative;">
            <div style="width:0%;background:${colors[result]||'#94a3b8'};height:100%;border-radius:4px;transition:width .6s ease;opacity:.85;" data-w="${pct}" class="tbar-fill"></div>
          </div>
          <div style="width:54px;color:#1e293b;font-weight:700;flex-shrink:0;text-align:right;">${formatQTime(d.secs)}</div>
        </div>`;
      }).join('');
      // Animate bars
      setTimeout(() => document.querySelectorAll('.tbar-fill').forEach(el => el.style.width = el.dataset.w + '%'), 100);

      // Summary boxes
      const avgSecs = Math.round(totalSecs / tData.length);
      const maxQ = tData.reduce((a,b) => a.secs > b.secs ? a : b, tData[0]);
      const minQ = tData.reduce((a,b) => a.secs < b.secs ? a : b, tData[0]);
      const timeSummary = document.getElementById('time-summary-boxes');
      if (timeSummary) timeSummary.innerHTML = [
        { icon:'fa-hourglass-half', label:'Total Time',    val: formatQTime(totalSecs), color:'#1565c0' },
        { icon:'fa-calculator',     label:'Avg per Q',     val: formatQTime(avgSecs),   color:'#15803d' },
        { icon:'fa-arrow-up',       label:'Most Time',     val: `Q${maxQ.idx} (${formatQTime(maxQ.secs)})`, color:'#b45309' },
        { icon:'fa-arrow-down',     label:'Least Time',    val: `Q${minQ.idx} (${formatQTime(minQ.secs)})`, color:'#64748b' },
      ].map(b => `<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px 12px;">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:${b.color};margin-bottom:4px;">
          <i class="fas ${b.icon}"></i> ${b.label}
        </div>
        <div style="font-size:15px;font-weight:800;font-family:'Rajdhani',sans-serif;color:#1e293b;">${b.val}</div>
      </div>`).join('');
    }

    // Update filter badges
    const total = renderedItems.length;
    document.getElementById('fc-all').textContent     = total;
    document.getElementById('fc-correct').textContent = counts.correct;
    document.getElementById('fc-wrong').textContent   = counts.wrong;
    document.getElementById('fc-partial').textContent = counts.partial;
    document.getElementById('fc-skipped').textContent = counts.skipped;

    renderFilter('all');

  } catch(e) {
    console.error('Error loading attempt:', e);
    document.getElementById('q-list').innerHTML =
      `<div class="loading-block">
        <i class="fas fa-exclamation-triangle" style="font-size:36px;color:var(--danger)"></i>
        <p style="margin-top:12px;color:var(--danger);font-weight:600;">${e.message}</p>
      </div>`;
  }
}

function setFilter(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentFilter = type;
  renderFilter(type);
}

function renderFilter(type) {
  const list = document.getElementById('q-list');
  const filtered = type === 'all' ? renderedItems : renderedItems.filter(i => i.result === type);
  if (!filtered.length) {
    list.innerHTML = `<div class="loading-block" style="padding:40px;">
      <i class="fas fa-inbox" style="font-size:36px;opacity:.4;"></i>
      <p style="margin-top:12px;">No ${type} questions.</p>
    </div>`;
    return;
  }
  list.innerHTML = filtered.map(i => i.html).join('');
}

async function doLogout() {
  await auth.signOut();
  window.location.href = '../index.html';
}
</script>
