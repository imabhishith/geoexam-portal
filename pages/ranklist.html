<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranklist — GeoExam Portal</title>
<link rel="stylesheet" href="../css/global.css">
<style>
  .page-content { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .rank-header { background: linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%); color:#fff; border-radius:var(--radius-lg); padding:24px; margin-bottom:24px; }
  .top3-row { display:grid; grid-template-columns:1fr 1.2fr 1fr; gap:16px; margin-bottom:24px; }
  .top-card { background:var(--surface); border-radius:var(--radius-lg); padding:20px; text-align:center; border:2px solid var(--border); position:relative; }
  .top-card.gold   { border-color:#f59e0b; }
  .top-card.silver { border-color:#94a3b8; }
  .top-card.bronze { border-color:#cd7c2f; }
  .medal { font-size:40px; }
  .rank-badge { position:absolute; top:-14px; left:50%; transform:translateX(-50%); background:#f59e0b; color:#fff; width:28px; height:28px; border-radius:50%; display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px; }
  .top-name { font-size:15px; font-weight:700; margin:8px 0 4px; }
  .top-score { font-size:24px; font-weight:800; font-family:'Rajdhani'; color:var(--primary); }
  .rank-row { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; transition:box-shadow .2s; }
  .rank-row:hover { box-shadow:var(--shadow); }
  .rank-row.my-row { background:#eff6ff; border-color:var(--primary); }
  .rank-num { width:36px; font-size:16px; font-weight:800; font-family:'Rajdhani'; color:var(--text2); text-align:center; }
  .rank-av  { width:38px; height:38px; border-radius:50%; background:var(--primary); color:#fff; display:flex;align-items:center;justify-content:center;font-weight:700; flex-shrink:0; }
  .rank-info { flex:1; }
  .rank-info .name { font-weight:700; font-size:15px; }
  .rank-info .sub  { font-size:12px; color:var(--text2); }
  .rank-score { font-size:18px; font-weight:800; font-family:'Rajdhani'; color:var(--primary); min-width:80px; text-align:right; }
  .rank-pct   { font-size:13px; color:var(--text2); min-width:50px; text-align:right; }
  .exam-sel   { display:flex; gap:10px; align-items:center; }
  select.exam-picker { font-size:15px; padding:8px 12px; border-radius:8px; border:2px solid var(--border); }
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">
    <span style="font-size:28px;">🪨</span>
    <div><h1>GeoExam Portal</h1><span>Ranklist</span></div>
  </div>
  <div class="navbar-nav">
    <a href="dashboard.html" class="nav-link">← Dashboard</a>
  </div>
</nav>

<div class="page-content">
  <div class="rank-header">
    <h2 style="margin-bottom:12px;">🏆 Exam Ranklist</h2>
    <div class="exam-sel">
      <label style="font-size:14px;opacity:.8;">Select Exam:</label>
      <select class="exam-picker" id="exam-picker" onchange="loadRanklist()">
        <option value="">— Choose Exam —</option>
      </select>
    </div>
  </div>

  <div id="rank-content">
    <div class="loading-screen" style="min-height:200px;"><div class="spinner"></div><p>Select an exam to view ranklist</p></div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
let currentUser=null;
const params=new URLSearchParams(location.search);

auth.onAuthStateChanged(async user=>{
  if(!user){window.location.href='../index.html';return;}
  currentUser=user;
  await loadExams();
  const eid=params.get('examId');
  if(eid){ document.getElementById('exam-picker').value=eid; loadRanklist(); }
});

async function loadExams(){
  const snap=await db.collection('exams').where('published','==',true).get();
  const sel=document.getElementById('exam-picker');
  snap.forEach(d=>{ const o=document.createElement('option'); o.value=d.id; o.textContent=d.data().title; sel.appendChild(o); });
}

async function loadRanklist(){
  const examId=document.getElementById('exam-picker').value;
  const cont=document.getElementById('rank-content');
  if(!examId){cont.innerHTML='<div class="empty-state"><div class="icon">📋</div><p>Please select an exam.</p></div>';return;}
  cont.innerHTML='<div class="loading-screen" style="min-height:200px;"><div class="spinner"></div><p>Loading ranklist…</p></div>';
  try{
    const snap=await db.collection('attempts')
      .where('examId','==',examId)
      .where('status','==','submitted')
      .orderBy('totalScore','desc')
      .get();
    if(snap.empty){cont.innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No attempts yet for this exam.</p></div>';return;}
    const docs=snap.docs;
    const maxScore=docs[0]?.data()?.maxScore||100;
    // Load user names
    const userIds=[...new Set(docs.map(d=>d.data().userId))];
    const userMap={};
    await Promise.all(userIds.map(async uid=>{
      const ud=await db.collection('users').doc(uid).get();
      userMap[uid]=ud.data();
    }));

    // Top 3
    let html='';
    const top3=docs.slice(0,3);
    if(top3.length>=1){
      html+=`<div class="top3-row">`;
      const medals=[{cls:'gold',emoji:'🥇',rb:'#f59e0b'},{cls:'gold',emoji:'🥇',rb:'#f59e0b'},{cls:'gold',emoji:'🥇',rb:'#f59e0b'}];
      const orderedDisplay=top3.length>=3?[top3[1],top3[0],top3[2]]:top3;
      const rankDisplayNums=top3.length>=3?[2,1,3]:[1,2,3];
      const emojiArr=['🥈','🥇','🥉'];
      orderedDisplay.forEach((doc,di)=>{
        const a=doc.data(); const u=userMap[a.userId]||{};
        const rn=rankDisplayNums[di];
        const em=emojiArr[di];
        html+=`<div class="top-card ${rn===1?'gold':rn===2?'silver':'bronze'}">
          <div class="rank-badge">${rn}</div>
          <div class="medal">${em}</div>
          <div class="top-name">${u.firstName||'Student'} ${u.lastName||''}</div>
          <div class="top-score">${(a.totalScore||0).toFixed(2)}</div>
          <div style="font-size:12px;color:var(--text2);">/ ${a.maxScore||maxScore}</div>
          ${a.userId===currentUser.uid?'<div style="margin-top:8px;"><span class="badge badge-primary">You</span></div>':''}
        </div>`;
      });
      html+=`</div>`;
    }

    // Full list
    html+=`<div class="card"><div class="card-header"><h3 style="font-size:16px">Complete Ranklist</h3><span class="badge badge-muted">${docs.length} candidates</span></div><div class="card-body" style="padding:16px;">`;
    docs.forEach((doc,i)=>{
      const a=doc.data(); const u=userMap[a.userId]||{};
      const isMe=a.userId===currentUser.uid;
      const pct=a.maxScore>0?((a.totalScore/a.maxScore)*100).toFixed(1):'—';
      const name=`${u.firstName||'Student'} ${(u.lastName||'')[0]||''}.`;
      html+=`<div class="rank-row ${isMe?'my-row':''}">
        <div class="rank-num">#${i+1}</div>
        <div class="rank-av">${(u.firstName||'S')[0]}</div>
        <div class="rank-info">
          <div class="name">${name} ${isMe?'<span class="badge badge-primary">You</span>':''}</div>
          <div class="sub">Correct: ${a.correct||0} | Wrong: ${a.wrong||0} | Partial: ${a.partial||0}</div>
        </div>
        <div class="rank-score">${(a.totalScore||0).toFixed(2)}</div>
        <div class="rank-pct">${pct}%</div>
      </div>`;
    });
    html+=`</div></div>`;
    cont.innerHTML=html;
  }catch(e){cont.innerHTML=`<div class="empty-state"><div class="icon">⚠️</div><p>Error: ${e.message}</p></div>`;}
}
</script>
</body>
</html>
