<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ranklist — GeoExam Portal</title>
<link rel="stylesheet" href="../css/global.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root { --navy:#0a2540; --navy2:#0e3460; --accent:#e65100; --accent2:#f57c00; --hdr-h:56px; --radius:8px; }
  .navbar { position:sticky;top:0;z-index:200;height:var(--hdr-h);background:var(--navy);border-bottom:3px solid var(--accent2);display:flex;align-items:stretch;padding:0; }
  .nav-logo { background:var(--accent);width:var(--hdr-h);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff; }
  .nav-brand { display:flex;flex-direction:column;justify-content:center;padding:0 18px;border-right:1px solid rgba(255,255,255,.1); }
  .nav-brand h1 { font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#fff;margin:0;line-height:1.1; }
  .nav-brand span { font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.05em;text-transform:uppercase; }
  .nav-links { display:flex;align-items:stretch;flex:1;padding:0 8px; }
  .nav-link { display:flex;align-items:center;gap:6px;padding:0 14px;color:rgba(255,255,255,.6);font-size:12.5px;font-weight:600;text-decoration:none;letter-spacing:.01em;transition:color .15s;white-space:nowrap; }
  .nav-link:hover,.nav-link:focus,.nav-link:active { color:#fff;text-decoration:none;background:none !important;box-shadow:none !important;border-bottom:none !important;outline:none !important; }
  .nav-link.active { color:#fff; }
  .nav-link i { font-size:13px; }
  .nav-right { display:flex;align-items:center;gap:8px;padding:0 14px;margin-left:auto; }
  .nav-icon-btn { width:34px;height:34px;border-radius:var(--radius);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s,color .15s;position:relative; }
  .nav-icon-btn:hover { background:rgba(255,255,255,.18);color:#fff; }
  .nav-badge { position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;font-weight:800;padding:0 3px;border:2px solid var(--navy); }
  @media(max-width:480px){ .nav-link span{display:none;} .nav-link{padding:0 10px;} }

  .page-content { max-width: 900px; margin: 0 auto; padding: 24px 16px; }
  .rank-header { background: linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%); color:#fff; border-radius:var(--radius-lg); padding:24px; margin-bottom:24px; }
  .top3-row { display:grid; grid-template-columns:1fr 1.2fr 1fr; gap:16px; margin-bottom:24px; align-items:flex-end; }
  .top-card { background:var(--surface); border-radius:var(--radius-lg); padding:20px; text-align:center; border:2px solid var(--border); position:relative; }
  .top-card.gold   { border-color:#f59e0b; }
  .top-card.silver { border-color:#94a3b8; }
  .top-card.bronze { border-color:#cd7c2f; }
  .medal { font-size:40px; margin-bottom:8px; }
  .rank-badge { position:absolute; top:-14px; left:50%; transform:translateX(-50%); width:28px; height:28px; border-radius:50%; display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff; }
  .rb-gold   { background:#f59e0b; }
  .rb-silver { background:#94a3b8; }
  .rb-bronze { background:#cd7c2f; }
  .top-name { font-size:15px; font-weight:700; margin:4px 0; }
  .top-score { font-size:24px; font-weight:800; font-family:'Rajdhani'; color:var(--primary); }
  .rank-row { display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--surface); border:1px solid var(--border); border-radius:8px; margin-bottom:8px; transition:box-shadow .2s; }
  .rank-row:hover { box-shadow:var(--shadow); }
  .rank-row.my-row { background:#eff6ff; border-color:var(--primary); }
  .rank-num { width:36px; font-size:16px; font-weight:800; font-family:'Rajdhani'; color:var(--text2); text-align:center; flex-shrink:0; }
  .rank-av  { width:38px; height:38px; border-radius:50%; background:var(--primary); color:#fff; display:flex;align-items:center;justify-content:center;font-weight:700; flex-shrink:0; }
  .rank-info { flex:1; min-width:0; }
  .rank-info .name { font-weight:700; font-size:15px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .rank-info .sub  { font-size:12px; color:var(--text2); }
  .rank-score { font-size:18px; font-weight:800; font-family:'Rajdhani'; color:var(--primary); min-width:80px; text-align:right; }
  .rank-pct   { font-size:13px; color:var(--text2); min-width:50px; text-align:right; }
  .exam-sel   { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  select.exam-picker { font-size:15px; padding:8px 12px; border-radius:8px; border:2px solid rgba(255,255,255,.4); background:rgba(255,255,255,.15); color:#fff; }
  select.exam-picker option { color: var(--text); background: var(--surface); }
  .empty-state { text-align:center; padding:48px 24px; color:var(--text2); }
  .empty-state .icon { font-size:48px; margin-bottom:16px; }
  .my-rank-highlight { background: linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%); color:#fff; border-radius:var(--radius-lg); padding:16px 20px; margin-bottom:20px; display:flex; align-items:center; gap:16px; }
  .my-rank-num { font-size:48px; font-weight:800; font-family:'Rajdhani'; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-logo"><i class="fas fa-gem"></i></div>
  <div class="nav-brand">
    <h1>GeoExam Portal</h1>
    <span>GATE Geology · CSIR-NET · CBT Platform</span>
  </div>
  <div class="nav-links">
    <a href="dashboard.html"  class="nav-link"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
    <a href="exams.html"      class="nav-link"><i class="fas fa-play-circle"></i><span>Exams</span></a>
    <a href="my-results.html" class="nav-link"><i class="fas fa-chart-bar"></i><span>My Results</span></a>
    <a href="ranklist.html"   class="nav-link active"><i class="fas fa-trophy"></i><span>Ranklist</span></a>
    <a href="discussion.html" class="nav-link"><i class="fas fa-comments"></i><span>Discussion</span></a>
    <a href="doubt-room.html" class="nav-link"><i class="fas fa-lightbulb"></i><span>Doubts</span></a>
    <a href="resources.html"  class="nav-link"><i class="fas fa-book"></i><span>Resources</span></a>
  </div>
  <div class="nav-right">
    <button class="nav-icon-btn" onclick="doLogout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
  </div>
</nav>

<div class="page-content">
  <div class="rank-header">
    <h2 style="margin-bottom:12px;"><i class="fas fa-trophy"></i> Exam Ranklist</h2>
    <div class="exam-sel">
      <label style="font-size:14px;opacity:.8;">Select Exam:</label>
      <select class="exam-picker" id="exam-picker" onchange="loadRanklist()">
        <option value="">— Choose Exam —</option>
      </select>
    </div>
  </div>

  <div id="rank-content">
    <div class="empty-state">
      <div class="icon"><i class="fas fa-clipboard-list"></i></div>
      <p>Select an exam above to view its ranklist.</p>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
let currentUser = null;
const params = new URLSearchParams(location.search);

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  currentUser = user;
  await loadExams();
  const eid = params.get('examId');
  if (eid) {
    document.getElementById('exam-picker').value = eid;
    loadRanklist();
  }
});

async function loadExams() {
  try {
    const snap = await db.collection('exams').where('published', '==', true).get();
    const sel = document.getElementById('exam-picker');
    snap.forEach(d => {
      const o = document.createElement('option');
      o.value = d.id;
      o.textContent = d.data().title;
      sel.appendChild(o);
    });
  } catch(e) {
    Utils.toast('Error loading exams: ' + e.message, 'error');
  }
}

async function loadRanklist() {
  const examId = document.getElementById('exam-picker').value;
  const cont = document.getElementById('rank-content');
  if (!examId) {
    cont.innerHTML = '<div class="empty-state"><div class="icon"><i class="fas fa-clipboard-list"></i></div><p>Please select an exam.</p></div>';
    return;
  }
  cont.innerHTML = '<div class="loading-screen" style="min-height:200px;"><div class="spinner"></div><p>Loading ranklist…</p></div>';

  try {
    // ── FIX: Only filter by examId + status (2 fields = no composite index needed).
    // We do NOT use orderBy here because examId+status+orderBy requires a composite
    // index that may not exist. Instead we sort client-side after fetching.
    const snap = await db.collection('attempts')
      .where('examId', '==', examId)
      .where('status', '==', 'submitted')
      .get();

    if (snap.empty) {
      cont.innerHTML = '<div class="empty-state"><div class="icon"><i class="fas fa-inbox"></i></div><p>No submissions yet for this exam. Be the first to attempt it!</p></div>';
      return;
    }

    // Sort by totalScore descending (client-side — avoids composite index)
    const docs = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (b.totalScore || 0) - (a.totalScore || 0));

    // Batch-fetch user names (only unique userIds)
    const userIds = [...new Set(docs.map(d => d.userId))];
    const userMap = {};
    await Promise.all(userIds.map(async uid => {
      try {
        const ud = await db.collection('users').doc(uid).get();
        userMap[uid] = ud.exists ? ud.data() : {};
      } catch(e) {
        userMap[uid] = {};
      }
    }));

    // Find current user's rank
    const myIdx = docs.findIndex(d => d.userId === currentUser.uid);
    const myRank = myIdx >= 0 ? myIdx + 1 : null;

    let html = '';

    // ── My Rank Banner (if user attempted this exam) ──
    if (myRank) {
      const myAttempt = docs[myIdx];
      const myPct = myAttempt.maxScore > 0
        ? ((myAttempt.totalScore / myAttempt.maxScore) * 100).toFixed(1)
        : '0.0';
      const percentile = docs.length > 1
        ? (((docs.length - myRank) / (docs.length - 1)) * 100).toFixed(1)
        : '100.0';
      html += `<div class="my-rank-highlight">
        <div class="my-rank-num">#${myRank}</div>
        <div>
          <div style="font-size:18px;font-weight:700;margin-bottom:4px;">Your Rank</div>
          <div style="opacity:.85;font-size:14px;">Score: ${(myAttempt.totalScore||0).toFixed(2)} / ${myAttempt.maxScore||0} · ${myPct}%</div>
          <div style="opacity:.75;font-size:13px;margin-top:2px;">Percentile: ${percentile}% · out of ${docs.length} candidates</div>
        </div>
      </div>`;
    }

    // ── Top 3 Podium ──
    if (docs.length >= 1) {
      const top3 = docs.slice(0, Math.min(3, docs.length));
      // Display order: 2nd, 1st, 3rd (classic podium)
      const podiumOrder = top3.length === 3
        ? [top3[1], top3[0], top3[2]]
        : top3.length === 2
        ? [top3[1], top3[0]]
        : [top3[0]];
      const podiumRanks  = top3.length === 3 ? [2, 1, 3] : top3.length === 2 ? [2, 1] : [1];
      const podiumStyles = top3.length === 3
        ? ['silver', 'gold', 'bronze']
        : top3.length === 2 ? ['silver', 'gold'] : ['gold'];
      const medals  = top3.length === 3 ? ['<i class="fas fa-medal" style="color:#94a3b8"></i>', '<i class="fas fa-medal" style="color:#f59e0b"></i>', '<i class="fas fa-medal" style="color:#cd7c2f"></i>'] : top3.length === 2 ? ['<i class="fas fa-medal" style="color:#94a3b8"></i>', '<i class="fas fa-medal" style="color:#f59e0b"></i>'] : ['<i class="fas fa-medal" style="color:#f59e0b"></i>'];
      const rbClass = top3.length === 3 ? ['rb-silver','rb-gold','rb-bronze'] : top3.length === 2 ? ['rb-silver','rb-gold'] : ['rb-gold'];

      html += `<div class="top3-row" style="grid-template-columns:${top3.length === 1 ? '1fr' : top3.length === 2 ? '1fr 1.2fr' : '1fr 1.2fr 1fr'}">`;
      podiumOrder.forEach((attempt, di) => {
        const u = userMap[attempt.userId] || {};
        const rn = podiumRanks[di];
        const fullName = `${u.firstName || 'Student'} ${u.lastName || ''}`.trim();
        const isMe = attempt.userId === currentUser.uid;
        html += `<div class="top-card ${podiumStyles[di]}">
          <div class="rank-badge ${rbClass[di]}">${rn}</div>
          <div class="medal">${medals[di]}</div>
          <div class="top-name">${fullName}${isMe ? ' <span class="badge badge-primary">You</span>' : ''}</div>
          <div class="top-score">${(attempt.totalScore || 0).toFixed(2)}</div>
          <div style="font-size:12px;color:var(--text2);">/ ${attempt.maxScore || 0}</div>
        </div>`;
      });
      html += `</div>`;
    }

    // ── Full List ──
    html += `<div class="card">
      <div class="card-header">
        <h3 style="font-size:16px">Complete Ranklist</h3>
        <span class="badge badge-muted">${docs.length} candidate${docs.length !== 1 ? 's' : ''}</span>
      </div>
      <div class="card-body" style="padding:16px;">`;

    docs.forEach((attempt, i) => {
      const u = userMap[attempt.userId] || {};
      const isMe = attempt.userId === currentUser.uid;
      const pct = attempt.maxScore > 0
        ? ((attempt.totalScore / attempt.maxScore) * 100).toFixed(1)
        : '0.0';
      // Show first name + last initial for privacy
      const displayName = u.firstName
        ? `${u.firstName} ${u.lastName ? u.lastName[0] + '.' : ''}`.trim()
        : 'Student';

      html += `<div class="rank-row ${isMe ? 'my-row' : ''}">
        <div class="rank-num">#${i + 1}</div>
        <div class="rank-av">${(u.firstName || 'S')[0].toUpperCase()}</div>
        <div class="rank-info">
          <div class="name">${displayName} ${isMe ? '<span class="badge badge-primary">You</span>' : ''}</div>
          <div class="sub"><i class="fas fa-check-circle"></i> ${attempt.correct || 0} Correct &nbsp;|&nbsp; <i class="fas fa-times-circle"></i> ${attempt.wrong || 0} Wrong &nbsp;|&nbsp; <i class="fas fa-bolt"></i> ${attempt.partial || 0} Partial</div>
        </div>
        <div class="rank-score">${(attempt.totalScore || 0).toFixed(2)}</div>
        <div class="rank-pct">${pct}%</div>
      </div>`;
    });

    html += `</div></div>`;
    cont.innerHTML = html;

  } catch(e) {
    console.error('Ranklist error:', e);
    let msg = e.message;
    if (e.code === 'permission-denied') {
      msg = 'Permission denied. Make sure you have published the updated Firestore security rules (firestore.rules) in Firebase Console <i class="fas fa-arrow-right"></i> Firestore <i class="fas fa-arrow-right"></i> Rules.';
    }
    cont.innerHTML = `<div class="empty-state"><div class="icon"><i class="fas fa-exclamation-triangle"></i></div><p style="color:var(--danger);font-weight:600;">Error loading ranklist</p><p style="font-size:13px;margin-top:8px;">${msg}</p></div>`;
  }
}

async function doLogout() {
  await auth.signOut();
  window.location.href = '../index.html';
}
</script>
</body>
</html>
