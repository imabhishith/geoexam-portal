<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Examination — GeoExam Portal</title>
<link rel="stylesheet" href="../css/global.css">
<style>
  body { background: #f0f4f8; overflow: hidden; }
  /* ── Exam Header ── */
  .exam-header { background: var(--primary); color: #fff; padding: 0 16px; height: 52px; display: flex; align-items: center; justify-content: space-between; position: fixed; top: 0; left: 0; right: 0; z-index: 200; }
  .exam-title-bar { font-family: 'Rajdhani'; font-size: 18px; font-weight: 700; }
  .timer-box { background: rgba(255,255,255,.15); border: 2px solid rgba(255,255,255,.4); border-radius: 8px; padding: 4px 16px; font-family: 'IBM Plex Mono'; font-size: 22px; font-weight: 600; letter-spacing: .1em; min-width: 110px; text-align: center; }
  .timer-box.warning { background: rgba(231,76,60,.3); border-color: #e74c3c; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.7} }

  /* ── Main Layout ── */
  .exam-layout { display: flex; margin-top: 52px; height: calc(100vh - 52px); }
  .exam-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .exam-sidebar { width: 280px; background: var(--surface); border-left: 2px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }

  /* ── Section Tabs ── */
  .section-tabs { background: var(--primary-dark); display: flex; overflow-x: auto; }
  .sec-tab { padding: 8px 16px; color: rgba(255,255,255,.7); font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; border-bottom: 3px solid transparent; transition: all .2s; }
  .sec-tab.active { color: #fff; border-bottom-color: var(--accent); background: rgba(255,255,255,.08); }

  /* ── Question Area ── */
  .question-area { flex: 1; overflow-y: auto; padding: 20px 24px; }
  .q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 2px solid var(--border); }
  .q-number { font-size: 15px; font-weight: 700; color: var(--primary); }
  .q-type-badge { background: var(--primary); color: #fff; font-size: 11px; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
  .q-marking { background: var(--bg); border-radius: 8px; padding: 8px 14px; font-size: 12px; display: flex; gap: 16px; margin-bottom: 16px; }
  .q-marking span { display: flex; align-items: center; gap: 4px; }
  .mark-pos { color: var(--success); font-weight: 700; }
  .mark-neg { color: var(--danger); font-weight: 700; }
  .q-image { max-width: 100%; max-height: 340px; border-radius: 8px; margin-bottom: 16px; border: 1px solid var(--border); display: block; }
  .q-text { font-size: 15px; line-height: 1.8; margin-bottom: 20px; color: var(--text); }
  /* Options */
  .options-list { display: flex; flex-direction: column; gap: 10px; }
  .option-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; border: 2px solid var(--border); border-radius: 10px; cursor: pointer; transition: all .2s; user-select: none; }
  .option-item:hover { border-color: var(--primary-light); background: #eff6ff; }
  .option-item.selected { border-color: var(--primary); background: #dbeafe; }
  .option-item.selected .opt-bubble { background: var(--primary); color: #fff; }
  .opt-bubble { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; color: var(--text2); transition: all .2s; }
  .opt-content { font-size: 14px; line-height: 1.6; flex: 1; }
  .opt-img { max-width: 200px; max-height: 150px; border-radius: 6px; margin-top: 6px; display: block; }
  /* NAT Input */
  .nat-input-wrap { margin-top: 12px; }
  .nat-input { font-size: 18px; font-family: 'IBM Plex Mono'; border: 2px solid var(--border); border-radius: 8px; padding: 12px 16px; width: 220px; text-align: center; }
  .nat-input:focus { border-color: var(--primary); outline: none; }

  /* ── Bottom Action Bar ── */
  .exam-actions { background: var(--surface); border-top: 2px solid var(--border); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .action-left { display: flex; gap: 8px; }
  .action-right { display: flex; gap: 8px; }

  /* ── Sidebar: Profile & Palette ── */
  .sidebar-profile { padding: 12px 14px; background: var(--primary); color: #fff; display: flex; align-items: center; gap: 10px; }
  .profile-av { width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,.2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 16px; }
  .profile-info { font-size: 12px; line-height: 1.5; }
  .sidebar-legend { padding: 10px 14px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .legend-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .legend-it { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .leg-dot { width: 22px; height: 22px; border-radius: 50%; font-size: 9px; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #fff; }
  .palette-scroll { flex: 1; overflow-y: auto; padding: 10px 14px; }
  .palette-section { margin-bottom: 12px; }
  .palette-sec-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
  .palette-grid { display: flex; flex-wrap: wrap; gap: 5px; }
  .q-btn { width: 34px; height: 34px; border-radius: 50%; border: none; cursor: pointer; font-size: 12px; font-weight: 700; color: #fff; display: flex; align-items: center; justify-content: center; transition: transform .15s; }
  .q-btn:hover { transform: scale(1.15); }
  .q-btn.active { outline: 3px solid var(--accent); outline-offset: 2px; }
  .qst-nv  { background: var(--q-not-visited); }
  .qst-na  { background: var(--q-not-answered); }
  .qst-ans { background: var(--q-answered); }
  .qst-mrk { background: var(--q-marked); }
  .qst-am  { background: var(--q-answered-marked); }

  .sidebar-stats { padding: 10px 14px; border-top: 1px solid var(--border); background: var(--bg); font-size: 12px; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
  .sidebar-stats div { background: var(--surface); border-radius: 6px; padding: 6px 10px; text-align: center; }
  .sidebar-stats .sval { font-size: 16px; font-weight: 700; font-family: 'Rajdhani'; }
  .sidebar-btn { margin: 10px 14px; }

  /* ── Calculator ── */
  .calc-panel { position: fixed; bottom: 80px; right: 290px; background: #2c3e50; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.4); z-index: 300; padding: 12px; width: 260px; display: none; }
  .calc-panel.show { display: block; }
  .calc-display { background: #1a252f; color: #2ecc71; font-family: 'IBM Plex Mono'; font-size: 22px; padding: 10px 14px; border-radius: 8px; text-align: right; margin-bottom: 10px; min-height: 48px; word-break: break-all; }
  .calc-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
  .calc-btn { background: #34495e; color: #fff; border: none; border-radius: 6px; padding: 10px 4px; cursor: pointer; font-size: 13px; font-weight: 600; transition: background .15s; }
  .calc-btn:hover { background: #4a6274; }
  .calc-btn.op  { background: #e67e22; }
  .calc-btn.eq  { background: #27ae60; }
  .calc-btn.clr { background: #c0392b; }
  .calc-btn.span2 { grid-column: span 2; }

  /* ── Submit Modal ── */
  .submit-confirm .stats-mini { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin: 16px 0; }
  .stat-mini-card { background: var(--bg); border-radius: 8px; padding: 12px; text-align: center; }
  .stat-mini-card .n { font-size: 24px; font-weight: 700; font-family: 'Rajdhani'; }
</style>
</head>
<body>

<!-- EXAM HEADER -->
<div class="exam-header">
  <div class="exam-title-bar" id="exam-header-title">Loading…</div>
  <div style="display:flex;align-items:center;gap:12px;">
    <button class="btn btn-ghost btn-sm" style="color:#fff;border:1px solid rgba(255,255,255,.3);" onclick="toggleCalc()">🧮 Calculator</button>
    <div class="timer-box" id="timer-display">00:00:00</div>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="exam-layout">
  <!-- Main Panel -->
  <div class="exam-main">
    <div class="section-tabs" id="section-tabs"></div>
    <div class="question-area" id="question-area">
      <div class="loading-screen"><div class="spinner"></div><p>Loading exam…</p></div>
    </div>
    <div class="exam-actions">
      <div class="action-left">
        <button class="btn btn-danger btn-sm" onclick="clearResponse()">Clear Response</button>
        <button class="btn btn-outline btn-sm" onclick="markForReview()">Mark for Review &amp; Next</button>
      </div>
      <div style="display:flex;gap:8px;">
        <button class="btn btn-ghost btn-sm" onclick="navigate(-1)">← Previous</button>
        <button class="btn btn-primary btn-sm" onclick="saveAndNext()">Save &amp; Next →</button>
      </div>
      <div class="action-right">
        <button class="btn btn-accent" onclick="confirmSubmit()">⬛ Submit Exam</button>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="exam-sidebar">
    <div class="sidebar-profile">
      <div class="profile-av" id="sb-avatar">?</div>
      <div class="profile-info">
        <div style="font-weight:700" id="sb-name">Student</div>
        <div style="opacity:.7">Candidate</div>
      </div>
    </div>
    <div class="sidebar-legend">
      <div class="legend-row">
        <div class="legend-it"><div class="leg-dot" style="background:var(--q-not-visited)">—</div>Not Visited</div>
        <div class="legend-it"><div class="leg-dot" style="background:var(--q-not-answered)">—</div>Not Ans.</div>
        <div class="legend-it"><div class="leg-dot" style="background:var(--q-answered)">—</div>Answered</div>
        <div class="legend-it"><div class="leg-dot" style="background:var(--q-marked)">—</div>Marked</div>
        <div class="legend-it"><div class="leg-dot" style="background:var(--q-answered-marked)">—</div>Ans+Marked</div>
      </div>
    </div>
    <div class="palette-scroll" id="palette-scroll"></div>
    <div class="sidebar-stats" id="sidebar-stats"></div>
    <div class="sidebar-btn">
      <button class="btn btn-accent btn-block" onclick="confirmSubmit()">Submit Exam</button>
    </div>
  </div>
</div>

<!-- Calculator -->
<div class="calc-panel" id="calc-panel">
  <div class="calc-display" id="calc-display">0</div>
  <div class="calc-grid">
    <button class="calc-btn clr span2" onclick="calcClear()">AC</button>
    <button class="calc-btn clr" onclick="calcDel()">⌫</button>
    <button class="calc-btn op" onclick="calcOp('/')">/</button>
    <button class="calc-btn op" onclick="calcOp('*')">×</button>
    <button class="calc-btn" onclick="calcNum('7')">7</button>
    <button class="calc-btn" onclick="calcNum('8')">8</button>
    <button class="calc-btn" onclick="calcNum('9')">9</button>
    <button class="calc-btn op" onclick="calcOp('-')">−</button>
    <button class="calc-btn op" onclick="calcOp('+')">+</button>
    <button class="calc-btn" onclick="calcNum('4')">4</button>
    <button class="calc-btn" onclick="calcNum('5')">5</button>
    <button class="calc-btn" onclick="calcNum('6')">6</button>
    <button class="calc-btn" onclick="calcFunc('sqrt')">√</button>
    <button class="calc-btn" onclick="calcFunc('pow2')">x²</button>
    <button class="calc-btn" onclick="calcNum('1')">1</button>
    <button class="calc-btn" onclick="calcNum('2')">2</button>
    <button class="calc-btn" onclick="calcNum('3')">3</button>
    <button class="calc-btn" onclick="calcFunc('log')">log</button>
    <button class="calc-btn" onclick="calcFunc('ln')">ln</button>
    <button class="calc-btn span2" onclick="calcNum('0')">0</button>
    <button class="calc-btn" onclick="calcDot()">.</button>
    <button class="calc-btn" onclick="calcSign()">±</button>
    <button class="calc-btn eq" onclick="calcEquals()">=</button>
  </div>
</div>

<!-- Submit Confirm Modal -->
<div class="modal-overlay" id="submit-modal">
  <div class="modal submit-confirm">
    <div class="modal-header">
      <h3>⚠️ Submit Examination?</h3>
      <button class="modal-close" onclick="closeModal('submit-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p style="margin-bottom:12px;">Are you sure you want to submit? This action <strong>cannot be undone</strong>.</p>
      <div class="stats-mini" id="submit-stats"></div>
      <div style="background:#fff3cd;border:1px solid #ffc107;border-radius:8px;padding:12px;font-size:13px;">
        ⚠️ Unanswered questions will be counted as <strong>0 marks</strong>. Make sure you have reviewed all questions.
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('submit-modal')">Go Back &amp; Review</button>
      <button class="btn btn-danger" onclick="submitExam()">Yes, Submit Now</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
// ── State ──
const params  = new URLSearchParams(location.search);
const examId  = params.get('id');
let examData  = null;
let questions = [];       // flat array
let sections  = [];       // [{title, questionIds}]
let currentSec= 0;
let currentQ  = 0;        // global index
let answers   = {};       // qId → {selected:[...], status:'na'|'ans'|'mrk'|'am'|'nv'}
let timerSec  = 0;
let timerInt  = null;
let attemptId = null;
let currentUser = null;
// Calculator state
let calcVal='0', calcOp_=null, calcPrev=null, calcNewNum=true;

// ── Auth & Init ──
auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  currentUser = user;
  const ud = (await db.collection('users').doc(user.uid).get()).data();
  document.getElementById('sb-name').textContent = ud?.firstName || user.displayName || 'Candidate';
  document.getElementById('sb-avatar').textContent = (ud?.firstName||'S')[0].toUpperCase();
  initExam();
});

async function initExam() {
  try {
    // Check existing in-progress attempt
    const existingSnap = await db.collection('attempts')
      .where('userId','==',currentUser.uid)
      .where('examId','==',examId)
      .where('status','==','in-progress')
      .get();

    const examDoc = await db.collection('exams').doc(examId).get();
    if (!examDoc.exists) { alert('Exam not found.'); window.location.href='dashboard.html'; return; }
    examData = examDoc.data();
    document.getElementById('exam-header-title').textContent = examData.title;
    timerSec = (examData.durationMinutes || 180) * 60;

    // Load questions
    const qIds = examData.questionIds || [];
    if (qIds.length === 0) { document.getElementById('question-area').innerHTML='<div class="empty-state"><div class="icon">📭</div><p>No questions in this exam.</p></div>'; return; }

    const qDocs = await Promise.all(qIds.map(id => db.collection('questions').doc(id).get()));
    questions = qDocs.filter(d=>d.exists).map(d=>({id:d.id,...d.data()}));

    // Build sections
    sections = examData.sections || [{ title:'All Questions', questionIds: qIds }];

    // Restore or create attempt
    if (!existingSnap.empty) {
      const att = existingSnap.docs[0];
      attemptId = att.id;
      const attData = att.data();
      answers = attData.answers || {};
      timerSec = attData.remainingSeconds ?? timerSec;
    } else {
      questions.forEach(q => { answers[q.id] = { selected:[], status:'nv' }; });
      const ref = await db.collection('attempts').add({
        userId: currentUser.uid, examId, examTitle: examData.title,
        status: 'in-progress', answers, remainingSeconds: timerSec,
        startedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      attemptId = ref.id;
    }

    buildSectionTabs();
    renderQuestion();
    renderPalette();
    startTimer();
    autoSaveInterval();
  } catch(e) { console.error(e); Utils.toast('Error loading exam: '+e.message,'error'); }
}

function buildSectionTabs() {
  const el = document.getElementById('section-tabs');
  el.innerHTML = sections.map((s,i) =>
    `<div class="sec-tab ${i===0?'active':''}" onclick="switchSection(${i})">${s.title}</div>`
  ).join('');
}

function switchSection(idx) {
  currentSec = idx;
  document.querySelectorAll('.sec-tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  // Find first question in section
  const secQIds = sections[idx].questionIds || [];
  const qi = questions.findIndex(q=>secQIds.includes(q.id));
  if (qi>=0) { currentQ=qi; renderQuestion(); renderPalette(); }
}

function renderQuestion() {
  const q = questions[currentQ];
  if (!q) return;
  const ans = answers[q.id] || { selected:[], status:'na' };
  if (ans.status === 'nv') { answers[q.id] = { ...ans, status:'na' }; }
  const posM = q.posMarks || q.marks || 1;
  const negM = q.negMarks || 0;

  let optionsHtml = '';
  if (q.type === 'nat') {
    const natVal = ans.selected[0] || '';
    optionsHtml = `<div class="nat-input-wrap">
      <p style="margin-bottom:10px;font-size:13px;color:var(--text2);">Enter your numerical answer:</p>
      <input type="number" class="nat-input" id="nat-input" value="${natVal}" step="any" placeholder="Type answer here"
        onchange="natAnswer(this.value)">
    </div>`;
  } else {
    const opts = q.options || [];
    optionsHtml = `<div class="options-list">` + opts.map((opt,i)=>{
      const label = String.fromCharCode(65+i);
      const sel = ans.selected.includes(i);
      const inputType = q.type==='mcq' ? 'checkbox' : 'radio';
      return `<div class="option-item ${sel?'selected':''}" onclick="toggleOption(${i})">
        <div class="opt-bubble">${label}</div>
        <div class="opt-content">
          ${opt.text||''}
          ${opt.imageUrl?`<img src="${opt.imageUrl}" class="opt-img" alt="option">`:''}
        </div>
        <input type="${inputType}" style="display:none" ${sel?'checked':''}>
      </div>`;
    }).join('') + `</div>`;
  }

  document.getElementById('question-area').innerHTML = `
    <div class="q-header">
      <div>
        <div class="q-number">Question ${currentQ+1} of ${questions.length}</div>
        <div style="font-size:12px;color:var(--text2);">${getSectionName(q.id)}</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span class="q-type-badge">${q.type==='scq'?'Single Correct':q.type==='mcq'?'Multiple Correct':'Numerical Answer'}</span>
      </div>
    </div>
    <div class="q-marking">
      <span>Marks: <span class="mark-pos">+${posM}</span></span>
      ${negM>0?`<span>Negative: <span class="mark-neg">−${negM}</span></span>`:'<span style="color:var(--text3)">No Negative Marking</span>'}
      ${q.type==='mcq'?'<span style="color:var(--info)">⚡ Partial Marking Applicable</span>':''}
    </div>
    ${q.imageUrl?`<img src="${q.imageUrl}" class="q-image" alt="question">`:''}
    <div class="q-text">${q.text||''}</div>
    ${optionsHtml}
  `;
}

function getSectionName(qid) {
  const sec = sections.find(s=>s.questionIds?.includes(qid));
  return sec ? sec.title : '';
}

function toggleOption(idx) {
  const q = questions[currentQ];
  const ans = answers[q.id];
  if (q.type === 'nat') return;
  if (q.type === 'scq') {
    ans.selected = ans.selected[0]===idx ? [] : [idx];
  } else {
    const pos = ans.selected.indexOf(idx);
    if (pos > -1) ans.selected.splice(pos,1);
    else ans.selected.push(idx);
  }
  renderQuestion();
}

function natAnswer(val) {
  const q = questions[currentQ];
  answers[q.id].selected = val!==''?[val]:[];
}

function saveAndNext() {
  const q = questions[currentQ];
  const ans = answers[q.id];
  if (q.type==='nat') {
    const v = document.getElementById('nat-input')?.value;
    if (v!==undefined&&v!=='') ans.selected=[v];
  }
  if (ans.selected.length>0) ans.status='ans';
  else ans.status='na';
  answers[q.id]=ans;
  navigate(1);
}

function markForReview() {
  const q = questions[currentQ];
  const ans = answers[q.id];
  if (q.type==='nat') { const v=document.getElementById('nat-input')?.value; if(v)ans.selected=[v]; }
  ans.status = ans.selected.length>0 ? 'am' : 'mrk';
  navigate(1);
}

function clearResponse() {
  const q = questions[currentQ];
  answers[q.id].selected=[];
  answers[q.id].status='na';
  renderQuestion();
  renderPalette();
}

function navigate(dir) {
  const newIdx = currentQ + dir;
  if (newIdx<0||newIdx>=questions.length) return;
  currentQ = newIdx;
  renderQuestion();
  renderPalette();
  // Switch section tab if needed
  for(let i=0;i<sections.length;i++){
    if(sections[i].questionIds?.includes(questions[currentQ].id)){
      if(i!==currentSec){ currentSec=i; document.querySelectorAll('.sec-tab').forEach((t,idx)=>t.classList.toggle('active',idx===i)); }
      break;
    }
  }
}

function renderPalette() {
  const container = document.getElementById('palette-scroll');
  let html='';
  sections.forEach((sec,si)=>{
    const secQs = questions.filter(q=>sec.questionIds?.includes(q.id));
    html+=`<div class="palette-section"><div class="palette-sec-title">${sec.title}</div><div class="palette-grid">`;
    secQs.forEach(q=>{
      const gi = questions.indexOf(q);
      const ans = answers[q.id]||{status:'nv'};
      const cls = {nv:'qst-nv',na:'qst-na',ans:'qst-ans',mrk:'qst-mrk',am:'qst-am'}[ans.status]||'qst-nv';
      html+=`<button class="q-btn ${cls} ${gi===currentQ?'active':''}" onclick="goTo(${gi})">${gi+1}</button>`;
    });
    html+=`</div></div>`;
  });
  container.innerHTML=html;

  // Stats
  const vals = Object.values(answers);
  const ans=vals.filter(a=>a.status==='ans'||a.status==='am').length;
  const na =vals.filter(a=>a.status==='na'||a.status==='nv').length;
  const mrk=vals.filter(a=>a.status==='mrk'||a.status==='am').length;
  document.getElementById('sidebar-stats').innerHTML=`
    <div><div class="sval" style="color:var(--success)">${ans}</div><div>Answered</div></div>
    <div><div class="sval" style="color:var(--danger)">${na}</div><div>Not Ans.</div></div>
    <div><div class="sval" style="color:var(--q-marked)">${mrk}</div><div>Marked</div></div>
    <div><div class="sval">${questions.length}</div><div>Total</div></div>
  `;
}

function goTo(idx) { currentQ=idx; renderQuestion(); renderPalette(); }

// ── Timer ──
function startTimer() {
  timerInt = setInterval(()=>{
    timerSec--;
    const el = document.getElementById('timer-display');
    el.textContent = Utils.formatTime(timerSec);
    if (timerSec<=300) el.classList.add('warning');
    if (timerSec<=0) { clearInterval(timerInt); Utils.toast('Time up! Submitting…','warning'); submitExam(); }
  }, 1000);
}

// ── Auto Save ──
function autoSaveInterval() {
  setInterval(async ()=>{
    if (!attemptId) return;
    try {
      await db.collection('attempts').doc(attemptId).update({ answers, remainingSeconds: timerSec });
    } catch(e){}
  }, 15000);
}

// ── Submit ──
function confirmSubmit() {
  const vals = Object.values(answers);
  const answered = vals.filter(a=>a.status==='ans'||a.status==='am').length;
  const notAns   = vals.filter(a=>a.status==='na'||a.status==='nv').length;
  const marked   = vals.filter(a=>a.status==='mrk'||a.status==='am').length;
  document.getElementById('submit-stats').innerHTML=`
    <div class="stat-mini-card"><div class="n" style="color:var(--success)">${answered}</div><div>Answered</div></div>
    <div class="stat-mini-card"><div class="n" style="color:var(--danger)">${notAns}</div><div>Not Answered</div></div>
    <div class="stat-mini-card"><div class="n" style="color:var(--q-marked)">${marked}</div><div>Marked for Review</div></div>
  `;
  document.getElementById('submit-modal').classList.add('open');
}

async function submitExam() {
  closeModal('submit-modal');
  clearInterval(timerInt);
  Utils.toast('Evaluating your answers…','info');

  // Evaluate scores
  let totalScore=0, maxScore=0, correct=0, wrong=0, partial=0, skipped=0;
  const evaluation = {};

  for(const q of questions){
    const qAns = answers[q.id]||{selected:[]};
    const posM = parseFloat(q.posMarks||q.marks||1);
    const negM = parseFloat(q.negMarks||0);
    const correctOpts = q.correctOptions||[];
    const correctNat  = q.correctAnswer;
    maxScore += posM;
    let qScore=0, qResult='skip';

    if (q.type==='nat'){
      const sel = parseFloat(qAns.selected[0]);
      const cor = parseFloat(correctNat);
      const tol = parseFloat(q.tolerance||0);
      if(!isNaN(sel)){
        if(Math.abs(sel-cor)<=tol){ qScore=posM; qResult='correct'; correct++; }
        else { qScore=0; qResult='wrong'; wrong++; }
      } else { skipped++; }
    } else if(q.type==='scq'){
      if(qAns.selected.length>0){
        if(correctOpts.includes(qAns.selected[0])){ qScore=posM; qResult='correct'; correct++; }
        else { qScore=-negM; qResult='wrong'; wrong++; }
      } else skipped++;
    } else if(q.type==='mcq'){
      if(qAns.selected.length>0){
        const selSet=new Set(qAns.selected), corSet=new Set(correctOpts);
        const hasWrong=[...selSet].some(s=>!corSet.has(s));
        if(hasWrong){ qScore=-negM; qResult='wrong'; wrong++; }
        else {
          const corrChosen=[...selSet].filter(s=>corSet.has(s)).length;
          if(corrChosen===corSet.size){ qScore=posM; qResult='correct'; correct++; }
          else { qScore=posM*(corrChosen/corSet.size); qResult='partial'; partial++; }
        }
      } else skipped++;
    }

    totalScore+=qScore;
    evaluation[q.id]={ selected:qAns.selected, correct:correctOpts.length>0?correctOpts:[correctNat], score:qScore, result:qResult };
  }

  try {
    await db.collection('attempts').doc(attemptId).update({
      status:'submitted', answers, evaluation,
      totalScore, maxScore, correct, wrong, partial, skipped,
      submittedAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    Utils.toast('Exam submitted successfully!','success');
    setTimeout(()=>window.location.href=`result.html?id=${attemptId}`,1500);
  } catch(e){ Utils.toast('Submit error: '+e.message,'error'); }
}

function closeModal(id){ document.getElementById(id).classList.remove('open'); }

// ── Calculator ──
function toggleCalc(){ document.getElementById('calc-panel').classList.toggle('show'); }
function calcDisplay(v){ const el=document.getElementById('calc-display'); el.textContent=String(v).length>12?parseFloat(v).toExponential(4):v; }
function calcNum(n){ if(calcVal==='0'||calcNewNum){ calcVal=n; calcNewNum=false; }else calcVal+=n; calcDisplay(calcVal); }
function calcDot(){ if(!calcVal.includes('.'))calcVal+='.'; calcDisplay(calcVal); }
function calcSign(){ calcVal=String(-parseFloat(calcVal)); calcDisplay(calcVal); }
function calcOp(op){ calcPrev=parseFloat(calcVal); calcOp_=op; calcNewNum=true; }
function calcEquals(){
  if(calcOp_===null||calcPrev===null)return;
  const cur=parseFloat(calcVal);
  let res;
  if(calcOp_==='+'){ res=calcPrev+cur; }
  else if(calcOp_==='-'){ res=calcPrev-cur; }
  else if(calcOp_==='*'){ res=calcPrev*cur; }
  else if(calcOp_==='/'){ res=cur!==0?calcPrev/cur:'Err'; }
  calcVal=String(res); calcOp_=null; calcPrev=null; calcNewNum=true; calcDisplay(calcVal);
}
function calcFunc(f){
  const n=parseFloat(calcVal);
  if(f==='sqrt')calcVal=String(Math.sqrt(n));
  else if(f==='pow2')calcVal=String(n*n);
  else if(f==='log')calcVal=String(Math.log10(n));
  else if(f==='ln')calcVal=String(Math.log(n));
  calcNewNum=true; calcDisplay(calcVal);
}
function calcClear(){ calcVal='0'; calcOp_=null; calcPrev=null; calcNewNum=true; calcDisplay('0'); }
function calcDel(){ calcVal=calcVal.length>1?calcVal.slice(0,-1):'0'; calcDisplay(calcVal); }

// ── Prevent accidental close ──
window.addEventListener('beforeunload',e=>{ e.preventDefault(); e.returnValue=''; });
</script>
