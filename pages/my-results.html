<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Results — GeoExam Portal</title>
<link rel="stylesheet" href="../css/global.css">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root { --navy:#0a2540; --navy2:#0e3460; --accent:#e65100; --accent2:#f57c00; --hdr-h:56px; --radius:8px; }
  .navbar { position:sticky;top:0;z-index:200;height:var(--hdr-h);background:var(--navy);border-bottom:3px solid var(--accent2);display:flex;align-items:stretch;padding:0; }
  .nav-logo { background:var(--accent);width:var(--hdr-h);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff; }
  .nav-brand { display:flex;flex-direction:column;justify-content:center;padding:0 18px;border-right:1px solid rgba(255,255,255,.1); }
  .nav-brand h1 { font-family:'Rajdhani',sans-serif;font-size:18px;font-weight:700;color:#fff;margin:0;line-height:1.1; }
  .nav-brand span { font-size:10px;color:rgba(255,255,255,.45);letter-spacing:.05em;text-transform:uppercase; }
  .nav-links { display:flex;align-items:stretch;flex:1;padding:0 8px; }
  .nav-link { display:flex;align-items:center;gap:6px;padding:0 14px;color:rgba(255,255,255,.6);font-size:12.5px;font-weight:600;text-decoration:none;letter-spacing:.01em;transition:color .15s;white-space:nowrap; }
  .nav-link:hover,.nav-link:focus,.nav-link:active { color:#fff;text-decoration:none;background:none !important;box-shadow:none !important;border-bottom:none !important;outline:none !important; }
  .nav-link.active { color:#fff; }
  .nav-link i { font-size:13px; }
  .nav-right { display:flex;align-items:center;gap:8px;padding:0 14px;margin-left:auto; }
  .nav-icon-btn { width:34px;height:34px;border-radius:var(--radius);background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.8);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:background .15s,color .15s;position:relative; }
  .nav-icon-btn:hover { background:rgba(255,255,255,.18);color:#fff; }
  .nav-badge { position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:8px;display:none;align-items:center;justify-content:center;font-weight:800;padding:0 3px;border:2px solid var(--navy); }
  @media(max-width:480px){ .nav-link span{display:none;} .nav-link{padding:0 10px;} }

  .page-content { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  .page-header { margin-bottom: 24px; }
  .page-header h1 { font-size: 28px; color: var(--primary); }
  .page-header p  { color: var(--text2); font-size: 14px; }
  .results-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px,1fr)); gap: 16px; margin-bottom: 28px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: box-shadow .2s; }
  .result-card:hover { box-shadow: var(--shadow-lg); }
  .result-card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .result-card-header h3 { font-size: 15px; color: var(--primary); margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .result-card-header .date { font-size: 12px; color: var(--text3); }
  .result-card-body { padding: 14px 18px; }
  .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .big-score { font-size: 32px; font-weight: 800; font-family: 'Rajdhani'; color: var(--primary); }
  .score-pct-badge { background: var(--primary); color: #fff; border-radius: 20px; padding: 4px 12px; font-weight: 700; font-size: 13px; }
  .mini-stats { display: flex; gap: 12px; font-size: 12px; margin-bottom: 12px; }
  .mini-stat { display: flex; align-items: center; gap: 4px; }
  .prog-bar { height: 8px; background: var(--bg2); border-radius: 4px; overflow: hidden; margin-bottom: 12px; }
  .prog-fill { height: 100%; border-radius: 4px; }
  .result-card-footer { padding: 10px 18px; border-top: 1px solid var(--border); background: var(--bg); display: flex; gap: 8px; }
  .summary-banner { background: linear-gradient(135deg,var(--primary) 0%,var(--primary-light) 100%); color:#fff; border-radius: var(--radius-lg); padding: 24px; margin-bottom: 24px; display: grid; grid-template-columns: repeat(4,1fr); gap: 20px; }
  .sb-stat { text-align: center; }
  .sb-stat .num { font-size: 32px; font-weight: 800; font-family: 'Rajdhani'; color: var(--accent-light); }
  .sb-stat .lbl { font-size: 12px; opacity: .8; font-weight: 600; }
  .filter-row { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .empty-state { text-align: center; padding: 64px 24px; }
  .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
  .empty-state h3 { font-size: 20px; color: var(--primary); margin-bottom: 8px; }
  .empty-state p { color: var(--text2); font-size: 14px; }
</style>
</head>
<body>
<nav class="navbar">
  <div class="nav-logo"><i class="fas fa-gem"></i></div>
  <div class="nav-brand">
    <h1>GeoExam Portal</h1>
    <span>GATE Geology · CSIR-NET · CBT Platform</span>
  </div>
  <div class="nav-links">
    <a href="dashboard.html"  class="nav-link"><i class="fas fa-th-large"></i><span>Dashboard</span></a>
    <a href="exams.html"      class="nav-link"><i class="fas fa-play-circle"></i><span>Exams</span></a>
    <a href="my-results.html" class="nav-link active"><i class="fas fa-chart-bar"></i><span>My Results</span></a>
    <a href="ranklist.html"   class="nav-link"><i class="fas fa-trophy"></i><span>Ranklist</span></a>
    <a href="discussion.html" class="nav-link"><i class="fas fa-comments"></i><span>Discussion</span></a>
    <a href="doubt-room.html" class="nav-link"><i class="fas fa-lightbulb"></i><span>Doubts</span></a>
    <a href="resources.html"  class="nav-link"><i class="fas fa-book"></i><span>Resources</span></a>
  </div>
  <div class="nav-right">
    <button class="nav-icon-btn" onclick="doLogout()" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
  </div>
</nav>

<div class="page-content">
  <div class="page-header">
    <h1><i class="fas fa-chart-bar"></i> My Results</h1>
    <p>All your exam attempts and performance analysis.</p>
  </div>

  <!-- Summary Banner -->
  <div class="summary-banner" id="summary-banner">
    <div class="sb-stat"><div class="num" id="sum-attempts">—</div><div class="lbl">Total Attempts</div></div>
    <div class="sb-stat"><div class="num" id="sum-best">—</div><div class="lbl">Best Score</div></div>
    <div class="sb-stat"><div class="num" id="sum-avg">—</div><div class="lbl">Average Score</div></div>
    <div class="sb-stat"><div class="num" id="sum-accuracy">—</div><div class="lbl">Avg Accuracy</div></div>
  </div>

  <!-- Filters -->
  <div class="filter-row">
    <select class="form-control" style="max-width:220px;" id="filter-exam" onchange="applyFilter()">
      <option value="">All Exams</option>
    </select>
    <select class="form-control" style="max-width:160px;" id="filter-sort" onchange="applyFilter()">
      <option value="date-desc">Newest First</option>
      <option value="date-asc">Oldest First</option>
      <option value="score-desc">Highest Score</option>
      <option value="score-asc">Lowest Score</option>
    </select>
  </div>

  <div id="results-grid" class="results-grid">
    <div class="loading-screen" style="grid-column:1/-1;min-height:200px;">
      <div class="spinner"></div><p>Loading your results…</p>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
let currentUser = null;
let allAttempts = [];

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  currentUser = user;
  await loadResults();
});

async function loadResults() {
  try {
    const snap = await db.collection('attempts')
      .where('userId', '==', currentUser.uid)
      .where('status', '==', 'submitted')
      .orderBy('submittedAt', 'desc')
      .get();

    allAttempts = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    // Populate exam filter
    const examNames = [...new Set(allAttempts.map(a => a.examTitle).filter(Boolean))];
    const filterEl = document.getElementById('filter-exam');
    examNames.forEach(n => {
      const o = document.createElement('option');
      o.value = n; o.textContent = n;
      filterEl.appendChild(o);
    });

    // Summary stats
    if (allAttempts.length > 0) {
      const scores = allAttempts.map(a => a.totalScore || 0);
      const maxScores = allAttempts.map(a => a.maxScore || 100);
      const best = Math.max(...scores);
      const avg  = scores.reduce((s,x)=>s+x,0) / scores.length;
      const totalQ = allAttempts.reduce((s,a)=>(s+(a.correct||0)+(a.wrong||0)+(a.skipped||0)),0);
      const totalC = allAttempts.reduce((s,a)=>s+(a.correct||0),0);
      const acc = totalQ > 0 ? ((totalC/totalQ)*100).toFixed(1)+'%' : '—';
      document.getElementById('sum-attempts').textContent = allAttempts.length;
      document.getElementById('sum-best').textContent     = best.toFixed(1);
      document.getElementById('sum-avg').textContent      = avg.toFixed(1);
      document.getElementById('sum-accuracy').textContent = acc;
    }

    applyFilter();
  } catch(e) {
    document.getElementById('results-grid').innerHTML =
      `<div class="empty-state" style="grid-column:1/-1"><div class="icon"><i class="fas fa-exclamation-triangle"></i></div><h3>Error loading results</h3><p>${e.message}</p></div>`;
  }
}

function applyFilter() {
  const examFilter = document.getElementById('filter-exam').value;
  const sort       = document.getElementById('filter-sort').value;

  let filtered = allAttempts.filter(a => !examFilter || a.examTitle === examFilter);

  filtered.sort((a, b) => {
    if (sort === 'date-desc')  return (b.submittedAt?.seconds||0) - (a.submittedAt?.seconds||0);
    if (sort === 'date-asc')   return (a.submittedAt?.seconds||0) - (b.submittedAt?.seconds||0);
    if (sort === 'score-desc') return (b.totalScore||0) - (a.totalScore||0);
    if (sort === 'score-asc')  return (a.totalScore||0) - (b.totalScore||0);
    return 0;
  });

  renderResults(filtered);
}

function renderResults(list) {
  const grid = document.getElementById('results-grid');
  if (!list.length) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <div class="icon"><i class="fas fa-inbox"></i></div>
      <h3>No exam attempts yet</h3>
      <p>Head to the dashboard and take your first exam!</p>
      <a href="dashboard.html" class="btn btn-primary mt-2">Go to Dashboard <i class="fas fa-arrow-right"></i></a>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(a => {
    const score   = a.totalScore || 0;
    const maxSc   = a.maxScore   || 100;
    const pct     = maxSc > 0 ? ((score / maxSc) * 100).toFixed(1) : 0;
    const date    = a.submittedAt?.toDate?.()?.toLocaleDateString('en-IN', { day:'numeric', month:'short', year:'numeric' }) || '—';
    const correct = a.correct  || 0;
    const wrong   = a.wrong    || 0;
    const partial = a.partial  || 0;
    const skipped = a.skipped  || 0;
    const total   = correct + wrong + partial + skipped;
    const acc     = total > 0 ? ((correct/total)*100).toFixed(0) : 0;

    // Color code by score %
    const color = pct >= 75 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';

    return `<div class="result-card">
      <div class="result-card-header">
        <h3 title="${a.examTitle||'Exam'}">${a.examTitle||'Exam'}</h3>
        <div class="date"><i class="fas fa-calendar-alt"></i> ${date}</div>
      </div>
      <div class="result-card-body">
        <div class="score-row">
          <div>
            <div class="big-score" style="color:${color}">${score.toFixed(2)}</div>
            <div style="font-size:12px;color:var(--text2);">out of ${maxSc}</div>
          </div>
          <div class="score-pct-badge" style="background:${color}">${pct}%</div>
        </div>
        <div class="prog-bar">
          <div class="prog-fill" style="width:${pct}%;background:${color}"></div>
        </div>
        <div class="mini-stats">
          <div class="mini-stat" style="color:var(--success)"><i class="fas fa-check-circle"></i> ${correct} Correct</div>
          <div class="mini-stat" style="color:var(--danger)"><i class="fas fa-times-circle"></i> ${wrong} Wrong</div>
          <div class="mini-stat" style="color:var(--warning)"><i class="fas fa-bolt"></i> ${partial} Partial</div>
          <div class="mini-stat" style="color:var(--text3)"><i class="far fa-square"></i> ${skipped} Skip</div>
        </div>
        <div style="font-size:12px;color:var(--text2);">Accuracy: <strong>${acc}%</strong></div>
      </div>
      <div class="result-card-footer">
        <a href="result.html?id=${a.id}" class="btn btn-primary btn-sm"><i class="fas fa-chart-bar"></i> View Analysis</a>
        <a href="ranklist.html?examId=${a.examId}" class="btn btn-outline btn-sm"><i class="fas fa-trophy"></i> Ranklist</a>
      </div>
    </div>`;
  }).join('');
}

async function doLogout() { await auth.signOut(); window.location.href = '../index.html'; }
</script>
</body>
</html>
