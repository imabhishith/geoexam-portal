<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doubt Solving Room — GeoExam Portal</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="../css/global.css">
  <style>
    body { background: var(--bg); }
    .page-wrap { max-width: 860px; margin: 0 auto; padding: 24px 16px; }
    .hero { background: linear-gradient(135deg,#7c3aed 0%,#4f46e5 100%); color:#fff; border-radius: var(--radius-lg); padding: 28px; margin-bottom: 24px; display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:16px; }
    .hero h1 { font-size:22px; font-weight:800; margin-bottom:6px; }
    .hero p  { font-size:13px; opacity:.85; }
    .ask-box { background:var(--surface); border:2px solid var(--primary); border-radius: var(--radius-lg); padding:20px; margin-bottom:24px; }
    .ask-box h2 { font-size:16px; font-weight:700; color:var(--primary); margin-bottom:16px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px; }
    .doubt-card { background:var(--surface); border:1px solid var(--border); border-radius: var(--radius-lg); margin-bottom:14px; overflow:hidden; transition: box-shadow .2s; }
    .doubt-card:hover { box-shadow: var(--shadow-lg); }
    .doubt-card.solved-card { border-left:4px solid var(--success); }
    .doubt-header { padding:14px 16px; display:flex; gap:12px; align-items:flex-start; }
    .doubt-avatar { width:40px; height:40px; border-radius:50%; background:var(--primary); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:15px; flex-shrink:0; }
    .doubt-meta { flex:1; min-width:0; }
    .doubt-meta .name { font-weight:700; font-size:14px; }
    .doubt-meta .sub { font-size:12px; color:var(--text2); margin-top:2px; }
    .doubt-text { font-size:14px; color:var(--text); line-height:1.7; margin:10px 0; }
    .doubt-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; padding-top:8px; border-top:1px solid var(--border); margin-top:8px; }
    .replies-section { border-top:1px solid var(--border); background:var(--bg); }
    .reply-item { padding:12px 16px 12px 60px; border-bottom:1px solid var(--border); }
    .reply-item.best { background:#f0fdf4; }
    .reply-composer { padding:12px 16px; border-top:1px solid var(--border); background:var(--surface); display:none; }
    .filter-bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
    .tab-row { display:flex; gap:8px; margin-bottom:20px; }
    .tab-btn { padding:8px 18px; border-radius:20px; border:1px solid var(--border); background:var(--surface); color:var(--text2); font-size:13px; font-weight:600; cursor:pointer; transition:.15s; }
    .tab-btn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
    .badge-topic { display:inline-block; padding:2px 10px; border-radius:10px; font-size:11px; font-weight:700; }
    .empty { text-align:center; padding:60px 24px; color:var(--text2); }
    .empty i { font-size:56px; opacity:.2; display:block; margin-bottom:16px; }
    @media(max-width:600px) { .form-row { grid-template-columns:1fr; } .hero { flex-direction:column; } }
  </style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-brand">
    <span style="font-size:26px;"><i class="fas fa-gem"></i></span>
    <div><h1>GeoExam Portal</h1><span>GATE · CSIR-NET Geology</span></div>
  </div>
  <div class="navbar-nav">
    <a href="dashboard.html" class="nav-link"><i class="fas fa-home"></i> Dashboard</a>
    <a href="discussion.html" class="nav-link"><i class="fas fa-comments"></i> Discussion</a>
    <a href="doubt-room.html" class="nav-link active"><i class="fas fa-lightbulb"></i> Doubts</a>
    <a href="resources.html" class="nav-link"><i class="fas fa-book"></i> Resources</a>
    <button class="btn btn-ghost btn-sm" id="notif-bell-btn" onclick="GxNotifications.toggle(event)" style="color:rgba(255,255,255,.8);position:relative;">
      <i class="fas fa-bell"></i>
      <span id="notif-bell-badge" style="display:none;position:absolute;top:2px;right:2px;background:var(--danger);color:#fff;font-size:9px;width:16px;height:16px;border-radius:50%;display:none;align-items:center;justify-content:center;font-weight:700;"></span>
    </button>
    <button class="btn btn-ghost btn-sm" onclick="doLogout()" style="color:rgba(255,255,255,.8)">Logout</button>
  </div>
</nav>

<div class="page-wrap">
  <!-- Hero -->
  <div class="hero">
    <div>
      <h1><i class="fas fa-lightbulb"></i> Doubt Solving Room</h1>
      <p>Ask your geology doubts — get answers from mentors & peers</p>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <div style="text-align:center;background:rgba(255,255,255,.15);padding:12px 20px;border-radius:10px;">
        <div id="hero-open" style="font-size:24px;font-weight:800;font-family:'Rajdhani';">—</div>
        <div style="font-size:11px;opacity:.8;">Open</div>
      </div>
      <div style="text-align:center;background:rgba(255,255,255,.15);padding:12px 20px;border-radius:10px;">
        <div id="hero-solved" style="font-size:24px;font-weight:800;font-family:'Rajdhani';">—</div>
        <div style="font-size:11px;opacity:.8;">Solved</div>
      </div>
    </div>
  </div>

  <!-- Ask a Doubt -->
  <div class="ask-box">
    <h2><i class="fas fa-pen"></i> Ask a Doubt</h2>
    <div class="form-row">
      <div>
        <label class="form-label">Topic / Subject</label>
        <select class="form-control" id="new-doubt-topic">
          <option value="gate-geology">GATE Geology</option>
          <option value="csir-net">CSIR-NET</option>
          <option value="general">General Geology</option>
          <option value="numericals">Numericals</option>
          <option value="theory">Theory</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div>
        <label class="form-label">Image (optional)</label>
        <input type="file" class="form-control" id="new-doubt-image" accept="image/*">
      </div>
    </div>
    <label class="form-label">Your Question</label>
    <textarea class="form-control" id="new-doubt-text" rows="4" placeholder="Describe your doubt clearly…" style="resize:vertical;margin-bottom:12px;"></textarea>
    <div style="display:flex;justify-content:flex-end;">
      <button class="btn btn-primary" onclick="postDoubt()"><i class="fas fa-paper-plane"></i> Post Doubt</button>
    </div>
  </div>

  <!-- Filters -->
  <div class="tab-row">
    <button class="tab-btn active" data-status="" onclick="setTab(this,'')">All Doubts</button>
    <button class="tab-btn" data-status="open" onclick="setTab(this,'open')">⏳ Open</button>
    <button class="tab-btn" data-status="solved" onclick="setTab(this,'solved')">✅ Solved</button>
    <button class="tab-btn" data-status="mine" onclick="setTab(this,'mine')">My Doubts</button>
  </div>
  <div class="filter-bar">
    <input type="text" class="form-control" id="doubt-search" placeholder="Search doubts…" style="max-width:240px;" oninput="filterDoubts()">
    <select class="form-control" style="max-width:160px;" id="doubt-topic-filter" onchange="filterDoubts()">
      <option value="">All Topics</option>
      <option value="gate-geology">GATE Geology</option>
      <option value="csir-net">CSIR-NET</option>
      <option value="general">General</option>
      <option value="numericals">Numericals</option>
      <option value="theory">Theory</option>
      <option value="other">Other</option>
    </select>
  </div>

  <div id="doubts-list">
    <div class="empty"><i class="fas fa-spinner fa-spin"></i><p>Loading doubts…</p></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script>
let currentUser = null, currentUserData = null;
let allDoubts = [], activeStatus = '', unsubscribeDoubts = null;
const TOPIC_COLORS = { 'gate-geology':'#dcfce7','csir-net':'#dbeafe','general':'#f3e8ff','numericals':'#fff7ed','theory':'#fef9c3','other':'#f1f5f9' };

auth.onAuthStateChanged(async user => {
  if (!user) { window.location.href = '../index.html'; return; }
  currentUser = user;
  const ud = (await db.collection('users').doc(user.uid).get()).data();
  currentUserData = ud;
  loadDoubts();
  GxNotifications.init(user);
});

function loadDoubts() {
  if (unsubscribeDoubts) unsubscribeDoubts();
  unsubscribeDoubts = db.collection('doubts')
    .orderBy('createdAt','desc').limit(100)
    .onSnapshot(snap => {
      allDoubts = snap.docs.map(d => ({id:d.id,...d.data()}));
      document.getElementById('hero-open').textContent   = allDoubts.filter(d=>d.status==='open').length;
      document.getElementById('hero-solved').textContent = allDoubts.filter(d=>d.status==='solved').length;
      filterDoubts();
    }, e => Utils.toast('Error: '+e.message,'error'));
}

function setTab(btn, status) {
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  activeStatus = status;
  filterDoubts();
}

function filterDoubts() {
  const q     = document.getElementById('doubt-search').value.toLowerCase();
  const topic = document.getElementById('doubt-topic-filter').value;
  let list = allDoubts;
  if (activeStatus === 'mine')   list = list.filter(d => d.userId === currentUser.uid);
  else if (activeStatus)         list = list.filter(d => d.status === activeStatus);
  if (topic) list = list.filter(d => d.topic === topic);
  if (q)     list = list.filter(d => d.text?.toLowerCase().includes(q) || d.userName?.toLowerCase().includes(q));
  renderDoubts(list);
}

function renderDoubts(list) {
  const el = document.getElementById('doubts-list');
  if (!list.length) {
    el.innerHTML = '<div class="empty"><i class="fas fa-question-circle"></i><p>No doubts found. Be the first to ask!</p></div>';
    return;
  }
  el.innerHTML = list.map(d => {
    const ts = d.createdAt?.toDate?.()?.toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})||'—';
    const solved = d.status === 'solved';
    const isOwner = d.userId === currentUser.uid;
    return `<div class="doubt-card ${solved?'solved-card':''}" id="dcard-${d.id}">
      <div class="doubt-header">
        <div class="doubt-avatar">${(d.userName||'S')[0].toUpperCase()}</div>
        <div class="doubt-meta">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
            <span class="name">${esc(d.userName||'Student')}</span>
            <span class="badge-topic" style="background:${TOPIC_COLORS[d.topic]||'#f1f5f9'}">${d.topic||'general'}</span>
            ${solved?'<span class="badge badge-success" style="font-size:10px;">✅ Solved</span>':'<span class="badge badge-warning" style="font-size:10px;">⏳ Open</span>'}
            <span style="font-size:11px;color:var(--text3);margin-left:auto;">${ts}</span>
          </div>
          <div class="doubt-text">${esc(d.text||'')}</div>
          ${d.imageUrl?`<img src="${d.imageUrl}" style="max-height:160px;border-radius:8px;margin-top:8px;border:1px solid var(--border);" alt="">`:'' }
          <div class="doubt-actions">
            <button class="btn btn-ghost btn-sm" onclick="toggleReplies('${d.id}')"><i class="fas fa-comments"></i> ${d.replyCount||0} Replies</button>
            <button class="btn btn-ghost btn-sm" onclick="upvoteDoubt('${d.id}')"><i class="fas fa-arrow-up"></i> ${d.upvotes||0}</button>
            <button class="btn btn-primary btn-sm" onclick="openReplyComposer('${d.id}')"><i class="fas fa-reply"></i> Reply</button>
            ${isOwner&&!solved?`<button class="btn btn-ghost btn-sm" style="color:var(--danger)" onclick="deleteMyDoubt('${d.id}')"><i class="fas fa-trash"></i></button>`:''}
          </div>
        </div>
      </div>
      <div id="replies-${d.id}" class="replies-section" style="display:none;"></div>
      <div id="composer-${d.id}" class="reply-composer">
        <textarea class="form-control" id="reply-text-${d.id}" rows="3" placeholder="Write your reply…" style="resize:vertical;margin-bottom:8px;"></textarea>
        <div style="display:flex;justify-content:flex-end;gap:8px;">
          <button class="btn btn-ghost btn-sm" onclick="closeReplyComposer('${d.id}')">Cancel</button>
          <button class="btn btn-primary btn-sm" onclick="postReply('${d.id}')"><i class="fas fa-paper-plane"></i> Post Reply</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function postDoubt() {
  const text  = document.getElementById('new-doubt-text').value.trim();
  const topic = document.getElementById('new-doubt-topic').value;
  const imageFile = document.getElementById('new-doubt-image').files[0];
  if (!text) { Utils.toast('Please write your doubt.','error'); return; }
  let imageUrl = '';
  if (imageFile) imageUrl = await Utils.imageToBase64(imageFile);
  const name = `${currentUserData?.firstName||''} ${currentUserData?.lastName||''}`.trim() || 'Student';
  try {
    await db.collection('doubts').add({
      userId: currentUser.uid, userName: name, text, topic, imageUrl,
      status: 'open', upvotes: 0, replyCount: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    document.getElementById('new-doubt-text').value = '';
    document.getElementById('new-doubt-image').value = '';
    Utils.toast('Doubt posted! Waiting for answers.','success');
  } catch(e) { Utils.toast('Error: '+e.message,'error'); }
}

async function toggleReplies(doubtId) {
  const el = document.getElementById(`replies-${doubtId}`);
  if (el.style.display !== 'none') { el.style.display = 'none'; return; }
  el.style.display = 'block';
  el.innerHTML = '<div style="padding:12px 16px;color:var(--text3);font-size:13px;">Loading…</div>';
  try {
    const snap = await db.collection('doubts').doc(doubtId).collection('replies').orderBy('createdAt','asc').get();
    if (snap.empty) { el.innerHTML = '<div style="padding:12px 16px 12px 60px;color:var(--text3);font-size:13px;font-style:italic;">No replies yet.</div>'; return; }
    el.innerHTML = snap.docs.map(r => {
      const rd = r.data();
      const rt = rd.createdAt?.toDate?.()?.toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})||'—';
      return `<div class="reply-item ${rd.isAccepted?'best':''}">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
          <strong style="font-size:13px;color:${rd.isAdmin?'var(--primary)':'var(--text)'}">${esc(rd.userName||'Student')}</strong>
          ${rd.isAdmin?'<span class="badge" style="background:#7c3aed;color:#fff;font-size:9px;">MENTOR</span>':''}
          ${rd.isAccepted?'<span class="badge badge-success" style="font-size:9px;">✅ Best Answer</span>':''}
          <span style="font-size:11px;color:var(--text3);margin-left:auto;">${rt}</span>
        </div>
        <div style="font-size:13px;line-height:1.7;">${esc(rd.text||'')}</div>
      </div>`;
    }).join('');
  } catch(e) { el.innerHTML = `<div style="padding:12px 16px;color:var(--danger);font-size:13px;">Error: ${e.message}</div>`; }
}

function openReplyComposer(doubtId) {
  const el = document.getElementById(`composer-${doubtId}`);
  el.style.display = el.style.display==='none'?'block':'none';
  if (el.style.display==='block') document.getElementById(`reply-text-${doubtId}`).focus();
}
function closeReplyComposer(doubtId) { document.getElementById(`composer-${doubtId}`).style.display='none'; }

async function postReply(doubtId) {
  const text = document.getElementById(`reply-text-${doubtId}`).value.trim();
  if (!text) { Utils.toast('Please write a reply.','error'); return; }
  const name = `${currentUserData?.firstName||''} ${currentUserData?.lastName||''}`.trim()||'Student';
  try {
    await db.collection('doubts').doc(doubtId).collection('replies').add({
      userId: currentUser.uid, userName: name, text, isAdmin: false, isAccepted: false,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    });
    await db.collection('doubts').doc(doubtId).update({ replyCount: firebase.firestore.FieldValue.increment(1) });
    document.getElementById(`reply-text-${doubtId}`).value = '';
    closeReplyComposer(doubtId);
    toggleReplies(doubtId); toggleReplies(doubtId); // refresh
    Utils.toast('Reply posted!','success');
  } catch(e) { Utils.toast('Error: '+e.message,'error'); }
}

async function upvoteDoubt(doubtId) {
  try {
    await db.collection('doubts').doc(doubtId).update({ upvotes: firebase.firestore.FieldValue.increment(1) });
  } catch(e) { Utils.toast('Error: '+e.message,'error'); }
}

async function deleteMyDoubt(doubtId) {
  if (!confirm('Delete your doubt?')) return;
  try {
    await db.collection('doubts').doc(doubtId).delete();
    Utils.toast('Doubt deleted.','success');
  } catch(e) { Utils.toast('Error: '+e.message,'error'); }
}

// ── Notifications ──
let notifs = [], notifsLoaded = false;
async function loadNotifications() {
  const lastSeen = parseInt(localStorage.getItem('notifs_last_seen')||'0');
  const snap = await db.collection('notifications')
    .where('createdAt','>',new firebase.firestore.Timestamp(lastSeen, 0))
    .orderBy('createdAt','desc').limit(30).get().catch(()=>null);
  if (!snap) return;
  notifs = snap.docs.filter(d => {
    const nd = d.data();
    return nd.global || nd.targetUserId === currentUser.uid;
  }).map(d=>({id:d.id,...d.data()}));
  const unread = notifs.filter(n => !n._read).length;
  const badge = document.getElementById('notif-bell-badge');
  if (badge && unread>0) { badge.textContent=unread; badge.style.display='flex'; }
  renderNotifList();
}

function renderNotifList() {
  const el = document.getElementById('notif-list');
  if (!notifs.length) { el.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3);font-size:13px;">No new notifications.</div>'; return; }
  const TYPE_ICONS = { exam:'fa-file-alt', resource:'fa-book', doubt:'fa-lightbulb', general:'fa-bell', system:'fa-cog' };
  el.innerHTML = notifs.map(n => {
    const ts = n.createdAt?.toDate?.()?.toLocaleString('en-IN',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})||'';
    const icon = TYPE_ICONS[n.type]||'fa-bell';
    return `<div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start;${n._read?'opacity:.6':''}">
      <div style="width:34px;height:34px;border-radius:50%;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <i class="fas ${icon}" style="color:var(--primary);font-size:14px;"></i>
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:700;margin-bottom:2px;">${esc(n.title||'')}</div>
        <div style="font-size:12px;color:var(--text2);">${esc(n.body||'')}</div>
        ${n.link?`<a href="${n.link}" style="font-size:11px;color:var(--primary);">View →</a>`:''}
        <div style="font-size:11px;color:var(--text3);margin-top:4px;">${ts}</div>
      </div>
    </div>`;
  }).join('');
}

function toggleNotifPanel() {
  const p = document.getElementById('notif-panel');
  p.style.display = p.style.display==='flex' ? 'none' : 'flex';
  p.style.flexDirection = 'column';
}

function markAllNotifsRead() {
  localStorage.setItem('notifs_last_seen', Math.floor(Date.now()/1000));
  document.getElementById('notif-bell-badge').style.display='none';
  notifs = notifs.map(n=>({...n,_read:true}));
  renderNotifList();
  Utils.toast('All notifications marked as read.','success');
}

function esc(s) { if(!s)return''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
async function doLogout() { await auth.signOut(); window.location.href='../index.html'; }

// Close notif panel on outside click
document.addEventListener('click', e => {
  const panel = document.getElementById('notif-panel');
  const btn   = document.getElementById('notif-bell-btn');
  if (panel && !panel.contains(e.target) && !btn.contains(e.target)) panel.style.display='none';
});
</script>
<script src="../js/notifications.js"></script>
</body>
</html>
