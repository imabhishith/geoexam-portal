<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoExam Portal — Login</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    body { background: linear-gradient(135deg, #0f2545 0%, #1a3c6e 50%, #2563ab 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-container { width: 100%; max-width: 440px; padding: 16px; }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo .logo-icon { width: 72px; height: 72px; background: rgba(255,255,255,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 36px; border: 2px solid rgba(255,255,255,.3); }
    .auth-logo h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .auth-logo p { color: rgba(255,255,255,.7); font-size: 14px; }
    .auth-card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
    .info-box { background: #eff6ff; border-left: 3px solid #2563ab; padding: 12px 14px; border-radius: 6px; font-size: 13px; color: #1e40af; margin-bottom: 16px; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #374151; }
    .form-control { width: 100%; padding: 10px 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; outline: none; transition: border .2s; }
    .form-control:focus { border-color: #2563ab; box-shadow: 0 0 0 3px rgba(37,99,171,.15); }
    .btn-primary { background: #2563ab; color: #fff; border: none; border-radius: 8px; padding: 12px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: background .2s; }
    .btn-primary:hover { background: #1d4ed8; }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .text-center { text-align: center; }
    .mt-2 { margin-top: 12px; }
    .signup-link { display: block; margin-top: 20px; text-align: center; font-size: 14px; color: #6b7280; }
    .signup-link a { color: #2563ab; font-weight: 600; text-decoration: none; }
    .toast-container { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
    .toast { background: #1f2937; color: #fff; padding: 12px 18px; border-radius: 8px; font-size: 14px; opacity: 0; transform: translateX(40px); transition: all .3s; max-width: 320px; }
    .toast.show { opacity: 1; transform: translateX(0); }
    .toast-success { background: #065f46; }
    .toast-error   { background: #7f1d1d; }
    .toast-warning { background: #78350f; }
  </style>
</head>
<body>
<div id="toast-container" class="toast-container"></div>

<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-icon"><i class="fas fa-gem"></i></div>
    <h1>GeoExam Portal</h1>
    <p>GATE Geology · CSIR-NET Geology · CBT Platform</p>
  </div>
  <div class="auth-card">
    <h2 style="margin:0 0 20px;font-size:20px;color:#111827;"><i class="fas fa-circle-user" style="color:#2563ab;"></i> Login to your account</h2>
    <div class="info-box"><i class="fas fa-bullhorn"></i> Use your registered email and password to access the portal.</div>

    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <input type="email" id="login-email" class="form-control" placeholder="yourname@example.com">
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="login-password" class="form-control" placeholder="Enter your password">
    </div>
    <button class="btn-primary" onclick="doLogin()" id="btn-login"><i class="fas fa-right-to-bracket"></i> Login to Portal</button>
    <div class="text-center mt-2">
      <a href="#" onclick="forgotPassword()" style="font-size:13px;color:#2563ab;"><i class="fas fa-key"></i> Forgot Password?</a>
    </div>
    <span class="signup-link"><i class="fas fa-user-plus"></i> Don't have an account? <a href="signup.html">Sign Up</a></span>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>

// ── Auto-redirect if already logged in ───────────────────────
auth.onAuthStateChanged(async user => {
  if (!user) return;
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    window.location.href = (doc.exists && doc.data().role === 'admin')
      ? 'admin/index.html'
      : 'pages/dashboard.html';
  } catch(e) {
    window.location.href = 'pages/dashboard.html';
  }
});

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  if (!email || !pass) { showToast('Please fill all fields', 'error'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Logging in…';

  try {
    const cred    = await auth.signInWithEmailAndPassword(email, pass);
    const userDoc = await db.collection('users').doc(cred.user.uid).get();

    // Fallback: create doc if missing (e.g. old account)
    if (!userDoc.exists) {
      await db.collection('users').doc(cred.user.uid).set({
        uid:       cred.user.uid,
        firstName: cred.user.displayName?.split(' ')[0] || '',
        lastName:  cred.user.displayName?.split(' ').slice(1).join(' ') || '',
        email:     cred.user.email,
        mobile:    '',
        role:      'student',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      window.location.href = 'pages/dashboard.html';
      return;
    }

    window.location.href = userDoc.data().role === 'admin'
      ? 'admin/index.html'
      : 'pages/dashboard.html';
  } catch(e) {
    showToast(friendlyError(e.code, e.message), 'error');
    btn.disabled = false; btn.textContent = 'Login to Portal';
  }
}

async function forgotPassword() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { showToast('Enter your email address first', 'warning'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    showToast('Password reset email sent!', 'success');
  } catch(e) {
    showToast(friendlyError(e.code, e.message), 'error');
  }
}

function friendlyError(code, fallback) {
  const map = {
    'auth/user-not-found':         'No account found with this email.',
    'auth/wrong-password':         'Incorrect password. Please try again.',
    'auth/invalid-email':          'Invalid email address.',
    'auth/too-many-requests':      'Too many attempts. Please wait and try again.',
    'auth/network-request-failed': 'Network error. Check your connection.',
  };
  return map[code] || fallback;
}

function showToast(msg, type = 'info') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 4000);
}
</script>
</body>
</html>
