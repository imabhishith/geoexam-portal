<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE Geology Exam Portal — Login</title>
<link rel="stylesheet" href="css/global.css">
<style>
  body { background: linear-gradient(135deg, #0f2545 0%, #1a3c6e 50%, #2563ab 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .auth-container { width: 100%; max-width: 440px; padding: 16px; }
  .auth-logo { text-align: center; margin-bottom: 28px; }
  .auth-logo .logo-icon { width: 72px; height: 72px; background: rgba(255,255,255,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 36px; border: 2px solid rgba(255,255,255,.3); }
  .auth-logo h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .auth-logo p { color: rgba(255,255,255,.7); font-size: 14px; }
  .auth-card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .auth-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: 600; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
  .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .or-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: var(--text3); font-size: 13px; }
  .or-divider::before, .or-divider::after { content: ''; flex: 1; border-top: 1px solid var(--border); }
  .info-box { background: #eff6ff; border-left: 3px solid var(--primary); padding: 12px 14px; border-radius: 6px; font-size: 13px; color: var(--primary-dark); margin-bottom: 16px; }
  .exam-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
  .stat-item { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; border: 1px solid rgba(255,255,255,.2); }
  .stat-item .val { font-size: 22px; font-weight: 700; color: var(--accent-light); font-family: 'Rajdhani', sans-serif; }
  .stat-item .lbl { font-size: 11px; color: rgba(255,255,255,.7); }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-icon">🪨</div>
    <h1>GeoExam Portal</h1>
    <p>GATE Geology · Computer Based Test</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="form-login">
      <div class="info-box">📢 Use your registered email and password to access the exam portal.</div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="yourname@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" class="form-control" placeholder="Enter your password">
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()" id="btn-login">
        Login to Portal
      </button>
      <div class="text-center mt-2">
        <a href="#" onclick="forgotPassword()" style="font-size:13px;">Forgot Password?</a>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div class="auth-form" id="form-signup">
      <div class="grid-2">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="signup-fname" class="form-control" placeholder="First Name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="signup-lname" class="form-control" placeholder="Last Name">
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signup-email" class="form-control" placeholder="yourname@example.com">
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" id="signup-mobile" class="form-control" placeholder="10-digit mobile number">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" class="form-control" placeholder="Minimum 8 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signup-confirm" class="form-control" placeholder="Re-enter password">
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="doSignup()" id="btn-signup">
        Create Account
      </button>
    </div>
  </div>

  <div class="exam-stats">
    <div class="stat-item"><div class="val">8+</div><div class="lbl">Years PYQs</div></div>
    <div class="stat-item"><div class="val">500+</div><div class="lbl">Questions</div></div>
    <div class="stat-item"><div class="val">GATE</div><div class="lbl">Geology</div></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?0:1)===i));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById(`form-${tab}`).classList.add('active');
}

async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  if (!email || !pass) { Utils.toast('Please fill all fields','error'); return; }
  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Logging in…';
  try {
    const cred = await auth.signInWithEmailAndPassword(email, pass);
    const uid  = cred.user.uid;
    const userDoc = await db.collection('users').doc(uid).get();
    if (userDoc.exists && userDoc.data().role === 'admin') {
      window.location.href = 'admin/index.html';
    } else {
      window.location.href = 'pages/dashboard.html';
    }
  } catch(e) {
    Utils.toast(e.message, 'error');
    btn.disabled = false; btn.textContent = 'Login to Portal';
  }
}

async function doSignup() {
  const fname = document.getElementById('signup-fname').value.trim();
  const lname = document.getElementById('signup-lname').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const mobile= document.getElementById('signup-mobile').value.trim();
  const pass  = document.getElementById('signup-password').value;
  const conf  = document.getElementById('signup-confirm').value;
  if (!fname||!lname||!email||!pass||!conf) { Utils.toast('Please fill all fields','error'); return; }
  if (pass !== conf) { Utils.toast('Passwords do not match','error'); return; }
  if (pass.length < 8) { Utils.toast('Password must be at least 8 characters','error'); return; }
  const btn = document.getElementById('btn-signup');
  btn.disabled = true; btn.textContent = 'Creating account…';
  try {
    const cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: `${fname} ${lname}` });
    await db.collection('users').doc(cred.user.uid).set({
      uid: cred.user.uid, firstName: fname, lastName: lname,
      email, mobile, role: 'student',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    Utils.toast('Account created! Redirecting…','success');
    setTimeout(() => window.location.href = 'pages/dashboard.html', 1200);
  } catch(e) {
    Utils.toast(e.message,'error');
    btn.disabled = false; btn.textContent = 'Create Account';
  }
}

async function forgotPassword() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { Utils.toast('Enter your email address first','warning'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    Utils.toast('Password reset email sent!','success');
  } catch(e) { Utils.toast(e.message,'error'); }
}

// Redirect if already logged in
auth.onAuthStateChanged(async user => {
  if (user) {
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists && doc.data().role === 'admin') window.location.href = 'admin/index.html';
    else window.location.href = 'pages/dashboard.html';
  }

  // ============================================================
// PASTE THE SIGN UP & ACCOUNT CREATION LOGIC HERE!
// ============================================================
document.addEventListener("DOMContentLoaded", () => {
  // If your HTML template has distinct login and signup forms, 
  // we look for the form wrapping the "Create Account" button.
  const signUpForm = document.querySelector("#signup-form") || document.querySelector("form");
  
  if (signUpForm) {
    signUpForm.addEventListener("submit", async (e) => {
      e.preventDefault(); 

      const firstName = signUpForm.querySelector('input[placeholder="First Name"]')?.value || "";
      const lastName = signUpForm.querySelector('input[placeholder="Last Name"]')?.value || "";
      const email = signUpForm.querySelector('input[placeholder="Email Address"]')?.value || "";
      const mobile = signUpForm.querySelector('input[placeholder="Mobile Number"]')?.value || "";
      const password = signUpForm.querySelector('input[placeholder="Password"]')?.value || "";
      const confirmPassword = signUpForm.querySelector('input[placeholder="Confirm Password"]')?.value || "";

      if (password !== confirmPassword) {
        Utils.toast("Passwords do not match!", "error");
        return;
      }

      try {
        Utils.toast("Creating account...", "info");

        // 1. Create account in Firebase Auth
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        // 2. Write details to your empty Firestore Database 
        await db.collection("users").doc(user.uid).set({
          uid: user.uid,
          firstName: firstName,
          lastName: lastName,
          email: email,
          mobile: mobile,
          role: "student", 
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        Utils.toast("Account created successfully!", "success");

        // 3. Move forward to your dashboard
        setTimeout(() => {
          window.location.reload(); // Reloads page to update authorization states
        }, 1500);

      } catch (error) {
        console.error("Sign up failure details:", error);
        Utils.toast(error.message, "error");
      }
    });
  }
});
</script>
</body>
</html>
