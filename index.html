<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GATE & CSIR-NET Geology Exam Portal — Login</title>
<link rel="stylesheet" href="css/global.css">
<style>
  body { background: linear-gradient(135deg, #0f2545 0%, #1a3c6e 50%, #2563ab 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .auth-container { width: 100%; max-width: 440px; padding: 16px; }
  .auth-logo { text-align: center; margin-bottom: 28px; }
  .auth-logo .logo-icon { width: 72px; height: 72px; background: rgba(255,255,255,.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; font-size: 36px; border: 2px solid rgba(255,255,255,.3); }
  .auth-logo h1 { color: #fff; font-size: 28px; font-weight: 700; margin-bottom: 4px; }
  .auth-logo p { color: rgba(255,255,255,.7); font-size: 14px; }
  .auth-card { background: #fff; border-radius: 16px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
  .auth-tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
  .auth-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-weight: 600; color: var(--text2); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all .2s; }
  .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
  .auth-form { display: none; }
  .auth-form.active { display: block; }
  .or-divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: var(--text3); font-size: 13px; }
  .or-divider::before, .or-divider::after { content: ''; flex: 1; border-top: 1px solid var(--border); }
  .info-box { background: #eff6ff; border-left: 3px solid var(--primary); padding: 12px 14px; border-radius: 6px; font-size: 13px; color: var(--primary-dark); margin-bottom: 16px; }
</style>
</head>
<body>
<div id="toast-container"></div>
<div class="auth-container">
  <div class="auth-logo">
    <div class="logo-icon"><i class="fas fa-gem"></i></div>
    <h1>GeoExam Portal</h1>
    <p>GATE Geology · CSIR-NET Geology · CBT Platform</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">Login</div>
      <div class="auth-tab" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <!-- LOGIN FORM -->
    <div class="auth-form active" id="form-login">
      <div class="info-box"><i class="fas fa-bullhorn"></i> Use your registered email and password to access the exam portal.</div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" class="form-control" placeholder="yourname@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" class="form-control" placeholder="Enter your password">
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="doLogin()" id="btn-login">
        Login to Portal
      </button>
      <div class="text-center mt-2">
        <a href="#" onclick="forgotPassword()" style="font-size:13px;">Forgot Password?</a>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div class="auth-form" id="form-signup">
      <div class="grid-2">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="signup-fname" class="form-control" placeholder="First Name">
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="signup-lname" class="form-control" placeholder="Last Name">
        </div>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="signup-email" class="form-control" placeholder="yourname@example.com">
      </div>
      <div class="form-group">
        <label>Mobile Number</label>
        <input type="tel" id="signup-mobile" class="form-control" placeholder="10-digit mobile number">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="signup-password" class="form-control" placeholder="Minimum 8 characters">
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" id="signup-confirm" class="form-control" placeholder="Re-enter password">
      </div>
      <button class="btn btn-primary btn-block btn-lg" onclick="doSignup()" id="btn-signup">
        Create Account
      </button>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>

// ── Tab switcher ──────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach((t,i) =>
    t.classList.toggle('active', (tab === 'login' ? 0 : 1) === i));
  document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
  document.getElementById(`form-${tab}`).classList.add('active');
}

// ── Login ─────────────────────────────────────────────────────
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  if (!email || !pass) { Utils.toast('Please fill all fields', 'error'); return; }

  const btn = document.getElementById('btn-login');
  btn.disabled = true; btn.textContent = 'Logging in…';

  try {
    const cred    = await auth.signInWithEmailAndPassword(email, pass);
    const uid     = cred.user.uid;
    const userDoc = await db.collection('users').doc(uid).get();

    // If Firestore doc is missing (edge-case for old accounts), create it now
    if (!userDoc.exists) {
      await db.collection('users').doc(uid).set({
        uid,
        firstName: cred.user.displayName ? cred.user.displayName.split(' ')[0] : '',
        lastName:  cred.user.displayName ? cred.user.displayName.split(' ').slice(1).join(' ') : '',
        email:     cred.user.email,
        mobile:    '',
        role:      'student',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      window.location.href = 'pages/dashboard.html';
      return;
    }

    if (userDoc.data().role === 'admin') {
      window.location.href = 'admin/index.html';
    } else {
      window.location.href = 'pages/dashboard.html';
    }
  } catch(e) {
    console.error('Login error:', e);
    Utils.toast(friendlyError(e.code, e.message), 'error');
    btn.disabled = false; btn.textContent = 'Login to Portal';
  }
}

// ── Sign-up ───────────────────────────────────────────────────
async function doSignup() {
  const fname  = document.getElementById('signup-fname').value.trim();
  const lname  = document.getElementById('signup-lname').value.trim();
  const email  = document.getElementById('signup-email').value.trim();
  const mobile = document.getElementById('signup-mobile').value.trim();
  const pass   = document.getElementById('signup-password').value;
  const conf   = document.getElementById('signup-confirm').value;

  if (!fname || !lname || !email || !pass || !conf) {
    Utils.toast('Please fill all fields', 'error'); return;
  }
  if (pass !== conf)    { Utils.toast('Passwords do not match', 'error'); return; }
  if (pass.length < 8)  { Utils.toast('Password must be at least 8 characters', 'error'); return; }

  const btn = document.getElementById('btn-signup');
  btn.disabled = true; btn.textContent = 'Creating account…';

  // ── STEP 1: Create Firebase Auth account ──
  let cred;
  try {
    cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: `${fname} ${lname}` });
  } catch(authErr) {
    console.error('Auth error:', authErr);
    Utils.toast(friendlyError(authErr.code, authErr.message), 'error');
    btn.disabled = false; btn.textContent = 'Create Account';
    return;
  }

  // ── STEP 2: Write Firestore user document ──
  // Force a token refresh first — Firebase Auth token sometimes hasn't
  // propagated to Firestore yet immediately after account creation,
  // which causes a false "permission-denied" on the very first write.
  const userPayload = {
    uid:       cred.user.uid,
    firstName: fname,
    lastName:  lname,
    email,
    mobile,
    role:      'student',
    createdAt: firebase.firestore.FieldValue.serverTimestamp()
  };

  const writeUserDoc = async () => {
    await db.collection('users').doc(cred.user.uid).set(userPayload);
  };

  try {
    // Force fresh token so Firestore rules see the correct auth.uid
    await cred.user.getIdToken(true);
    await writeUserDoc();
    Utils.toast('Account created! Redirecting…', 'success');
    setTimeout(() => window.location.href = 'pages/dashboard.html', 1200);
  } catch(fsErr) {
    console.warn('First Firestore write attempt failed, retrying…', fsErr);
    // Retry once after a short delay (token propagation lag)
    try {
      await new Promise(r => setTimeout(r, 1500));
      await cred.user.getIdToken(true);
      await writeUserDoc();
      Utils.toast('Account created! Redirecting…', 'success');
      setTimeout(() => window.location.href = 'pages/dashboard.html', 1200);
    } catch(fsErr2) {
      console.error('Firestore write failed after retry:', fsErr2);
      let hint = '';
      if (fsErr2.code === 'permission-denied') {
        hint = 'Permission denied. Make sure you have published the Firestore security rules in Firebase Console → Firestore → Rules.';
      } else {
        hint = fsErr2.message;
      }
      Utils.toast('Account created but profile save failed: ' + hint, 'error', 8000);
      btn.disabled = false; btn.textContent = 'Create Account';
    }
  }
}

// ── Forgot password ───────────────────────────────────────────
async function forgotPassword() {
  const email = document.getElementById('login-email').value.trim();
  if (!email) { Utils.toast('Enter your email address first', 'warning'); return; }
  try {
    await auth.sendPasswordResetEmail(email);
    Utils.toast('Password reset email sent!', 'success');
  } catch(e) {
    Utils.toast(friendlyError(e.code, e.message), 'error');
  }
}

// ── Friendly error messages ───────────────────────────────────
function friendlyError(code, fallback) {
  const map = {
    'auth/user-not-found':       'No account found with this email.',
    'auth/wrong-password':       'Incorrect password. Please try again.',
    'auth/invalid-email':        'Invalid email address.',
    'auth/email-already-in-use': 'An account with this email already exists.',
    'auth/weak-password':        'Password is too weak. Use at least 8 characters.',
    'auth/too-many-requests':    'Too many attempts. Please wait a moment and try again.',
    'auth/network-request-failed': 'Network error. Check your internet connection.',
    'permission-denied':         'Firestore permission denied. Please publish Firestore security rules in Firebase Console.',
  };
  return map[code] || fallback;
}

// ── Auto-redirect if already logged in ───────────────────────
auth.onAuthStateChanged(async user => {
  if (!user) return;
  try {
    const doc = await db.collection('users').doc(user.uid).get();
    if (doc.exists && doc.data().role === 'admin') {
      window.location.href = 'admin/index.html';
    } else {
      window.location.href = 'pages/dashboard.html';
    }
  } catch(e) {
    // If Firestore is unreachable at this point, just go to dashboard
    console.warn('onAuthStateChanged Firestore read failed:', e);
    window.location.href = 'pages/dashboard.html';
  }
});
</script>
</body>
</html>
