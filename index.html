<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoExam Portal — Login & Sign Up</title>
    <style>
        :root {
            --primary: #2b6cb0;
            --primary-hover: #2c5282;
            --bg: #f7fafc;
            --card-bg: #ffffff;
            --text: #2d3748;
            --border: #e2e8f0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: var(--card-bg);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 450px;
        }
        h1 {
            font-size: 28px;
            text-align: center;
            margin-bottom: 5px;
            color: #1a202c;
        }
        .subtitle {
            text-align: center;
            color: #718096;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        .toggle-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--primary);
            cursor: pointer;
        }
        .toggle-link:hover {
            text-decoration: underline;
        }
        .hidden {
            display: none;
        }
        .error {
            color: #e53e3e;
            background: #fff5f5;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid #fed7d7;
        }
        .success {
            color: #38a169;
            background: #f0fff4;
            padding: 10px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 15px;
            border: 1px solid #c6f6d5;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>GeoExam Portal</h1>
    <p class="subtitle">GATE Geology · CSIR-NET Geology · CBT Platform</p>

    <!-- Message Alerts -->
    <div id="errorMessage" class="error hidden"></div>
    <div id="successMessage" class="success hidden"></div>

    <!-- LOGIN FORM -->
    <form id="loginForm">
        <div class="form-group">
            <label for="loginEmail">Email Address</label>
            <input type="email" id="loginEmail" required placeholder="name@example.com">
        </div>
        <div class="form-group">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" required placeholder="••••••••">
        </div>
        <button type="submit">Login to Portal</button>
        <p class="toggle-link" onclick="switchForm('signup')">Don't have an account? Sign Up</p>
    </form>

    <!-- SIGN UP FORM (HIDDEN BY DEFAULT) -->
    <form id="signupForm" class="hidden">
        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required placeholder="John">
        </div>
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required placeholder="Doe">
        </div>
        <div class="form-group">
            <label for="signupEmail">Email Address</label>
            <input type="email" id="signupEmail" required placeholder="john.doe@example.com">
        </div>
        <div class="form-group">
            <label for="mobileNumber">Mobile Number</label>
            <input type="tel" id="mobileNumber" required placeholder="9876543210">
        </div>
        <div class="form-group">
            <label for="signupPassword">Password</label>
            <input type="password" id="signupPassword" required placeholder="Min 6 characters">
        </div>
        <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" required placeholder="••••••••">
        </div>
        <button type="submit">Create Account</button>
        <p class="toggle-link" onclick="switchForm('login')">Already registered? Login</p>
    </form>
</div>

<!-- FIREBASE INTEGRATION SCRIPT -->
<script type="module">
    // Import essential Firebase SDK modules
    import { initializeApp } from "https://gstatic.com";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://gstatic.com";
    import { getFirestore, doc, setDoc } from "https://gstatic.com";

    // ⚠️ REPLACE THIS CONFIG OBJECT WITH YOUR ACTUAL FIREBASE DETAILS FROM CONSOLE
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_PROJECT_://firebaseapp.com",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_PROJECT_://appspot.com",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // UI Switching Mechanics
    window.switchForm = function(view) {
        clearAlerts();
        if (view === 'signup') {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('signupForm').classList.remove('hidden');
        } else {
            document.getElementById('signupForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }
    };

    function showAlert(id, msg) {
        const el = document.getElementById(id);
        el.innerText = msg;
        el.classList.remove('hidden');
    }

    function clearAlerts() {
        document.getElementById('errorMessage').classList.add('hidden');
        document.getElementById('successMessage').classList.add('hidden');
    }

    // --- SUBMIT REGISTRATION (SIGN UP) ---
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlerts();

        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const email = document.getElementById('signupEmail').value;
        const mobileNumber = document.getElementById('mobileNumber').value;
        const password = document.getElementById('signupPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (password !== confirmPassword) {
            showAlert('errorMessage', "Passwords do not match!");
            return;
        }

        try {
            // 1. Create Identity inside Firebase Auth
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // 2. CRITICAL FIX: Explicitly create profile document targeting /users/{userId} 
            // using .uid as the explicit key to pass Firestore Rules check.
            await setDoc(doc(db, "users", user.uid), {
                userId: user.uid,
                firstName: firstName,
                lastName: lastName,
                email: email.toLowerCase().trim(),
                mobileNumber: mobileNumber,
                role: "student", // Matches validation condition
                createdAt: new Date().toISOString()
            });

            showAlert('successMessage', "Account registered completely! Redirecting...");
            document.getElementById('signupForm').reset();
            
            // Redirect down to dashboard destination after 1.5 seconds
            setTimeout(() => { window.location.href = "/dashboard.html"; }, 1500);

        } catch (error) {
            showAlert('errorMessage', "Registration Failed: " + error.message);
        }
    });

    // --- SUBMIT AUTHENTICATION (LOGIN) ---
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        clearAlerts();

        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;

        try {
            await signInWithEmailAndPassword(auth, email, password);
            showAlert('successMessage', "Success! Logging in...");
            setTimeout(() => { window.location.href = "/dashboard.html"; }, 1000);
        } catch (error) {
            showAlert('errorMessage', "Login Error: " + error.message);
        }
    });
</script>

</body>
</html>
