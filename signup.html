<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoExam Portal — Sign Up</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    :root {
      --navy:    #0a2540;
      --navy2:   #0e3460;
      --blue:    #1565c0;
      --accent:  #e65100;
      --accent2: #f57c00;
      --font:    'Noto Sans','Segoe UI',Arial,sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--navy);
      overflow-x: hidden;
      overflow-y: auto;
      position: relative;
    }

    #bg-canvas {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      z-index: 0;
    }

    .glow-orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 1;
      filter: blur(80px);
      animation: orbFloat 14s ease-in-out infinite;
    }
    .glow-orb.orb1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(21,101,192,.3) 0%, transparent 70%);
      top: -100px; right: -100px;
      animation-delay: 0s;
    }
    .glow-orb.orb2 {
      width: 380px; height: 380px;
      background: radial-gradient(circle, rgba(230,81,0,.22) 0%, transparent 70%);
      bottom: -80px; left: -80px;
      animation-delay: -7s;
    }
    @keyframes orbFloat {
      0%,100% { transform: translate(0,0); }
      50%      { transform: translate(25px,-30px); }
    }

    .auth-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 500px;
      padding: 24px 16px;
      animation: slideUp .6s cubic-bezier(.22,.61,.36,1) both;
    }
    @keyframes slideUp {
      from { opacity:0; transform: translateY(30px); }
      to   { opacity:1; transform: translateY(0); }
    }

    /* ── LOGO ── */
    .auth-logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-ring {
      width: 72px; height: 72px;
      margin: 0 auto 12px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue) 0%, var(--navy2) 100%);
      border: 2px solid var(--accent2);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; color: #fff;
      box-shadow: 0 0 0 6px rgba(245,124,0,.12), 0 8px 28px rgba(0,0,0,.4);
      position: relative;
    }
    .logo-ring::after {
      content: '';
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1px solid rgba(245,124,0,.22);
      animation: ringPulse 2.8s ease-in-out infinite;
    }
    @keyframes ringPulse {
      0%,100% { transform:scale(1);   opacity:.6; }
      50%      { transform:scale(1.1); opacity:0;  }
    }
    .auth-logo h1 {
      font-family: 'Rajdhani', sans-serif;
      font-size: 28px; font-weight: 700; color: #fff;
      letter-spacing: .02em; margin-bottom: 4px;
    }
    .auth-logo h1 span { color: var(--accent2); }
    .auth-logo p {
      font-size: 12px;
      color: rgba(255,255,255,.5);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    /* ── CARD ── */
    .auth-card {
      background: rgba(255,255,255,.96);
      backdrop-filter: blur(12px);
      border-radius: 18px;
      padding: 30px 30px 26px;
      box-shadow: 0 24px 64px rgba(0,0,0,.45), 0 0 0 1px rgba(255,255,255,.08);
      border-top: 3px solid var(--accent2);
    }
    .card-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 22px; font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
      display: flex; align-items: center; gap: 8px;
    }
    .card-title i { color: var(--accent); font-size: 18px; }
    .card-sub {
      font-size: 13px; color: #6b7280;
      margin-bottom: 18px;
      padding-bottom: 16px;
      border-bottom: 1px solid #e5e7eb;
    }

    /* ── PROGRESS ── */
    .progress-wrap { margin-bottom: 18px; }
    .progress-label {
      font-size: 11.5px; color: #6b7280;
      margin-bottom: 6px;
      display: flex; justify-content: space-between;
      align-items: center;
    }
    .progress-label span:last-child { font-weight: 600; color: var(--accent); }
    .progress-bar {
      height: 4px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--accent2));
      border-radius: 4px;
      transition: width .4s ease;
    }

    /* ── GRID ── */
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ── FORM ── */
    .form-group { margin-bottom: 15px; }
    .form-group label {
      display: flex; align-items: center; gap: 6px;
      font-size: 12.5px; font-weight: 600;
      color: #374151; margin-bottom: 6px;
    }
    .form-group label i { color: var(--blue); font-size: 11px; }
    .form-control {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #d1d5db;
      border-radius: 9px; font-size: 14px;
      font-family: var(--font);
      background: #fafafa;
      outline: none;
      transition: border .2s, box-shadow .2s, background .2s;
    }
    .form-control:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(21,101,192,.12);
    }

    /* ── BUTTON ── */
    .btn-primary {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #fff; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 700;
      font-family: 'Rajdhani', sans-serif;
      letter-spacing: .04em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: filter .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 4px 18px rgba(230,81,0,.35);
    }
    .btn-primary:hover:not(:disabled) {
      filter: brightness(1.1);
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(230,81,0,.45);
    }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    .login-link {
      text-align: center; font-size: 13.5px;
      color: #6b7280; margin-top: 16px;
    }
    .login-link a {
      color: var(--accent); font-weight: 700; text-decoration: none;
    }
    .login-link a:hover { text-decoration: underline; }

    /* ── TOAST ── */
    .toast-container {
      position: fixed; top: 20px; right: 20px;
      z-index: 9999; display: flex; flex-direction: column; gap: 8px;
    }
    .toast {
      background: #1f2937; color: #fff;
      padding: 12px 18px; border-radius: 9px;
      font-size: 13.5px; opacity: 0;
      transform: translateX(40px);
      transition: all .3s; max-width: 340px;
      display: flex; align-items: flex-start; gap: 9px;
      box-shadow: 0 4px 18px rgba(0,0,0,.3);
    }
    .toast.show { opacity: 1; transform: translateX(0); }
    .toast-success { background: #065f46; }
    .toast-error   { background: #7f1d1d; }
    .toast-warning { background: #78350f; }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div class="glow-orb orb1"></div>
<div class="glow-orb orb2"></div>
<div id="toast-container" class="toast-container"></div>

<div class="auth-wrapper">
  <!-- Logo -->
  <div class="auth-logo">
    <div class="logo-ring"><i class="fas fa-gem"></i></div>
    <h1>Geo<span>Exam</span> Portal</h1>
    <p>GATE Geology &nbsp;·&nbsp; CSIR-NET Geology &nbsp;·&nbsp; CBT Platform</p>
  </div>

  <!-- Card -->
  <div class="auth-card">
    <div class="card-title"><i class="fas fa-user-plus"></i> Create your account</div>
    <p class="card-sub">Fill in the details below to get started — it's free.</p>

    <div class="progress-wrap">
      <div class="progress-label">
        <span id="progress-text">Step 1 of 2 — Personal Details</span>
        <span id="progress-pct">50%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progress-fill" style="width:50%"></div>
      </div>
    </div>

    <div class="grid-2">
      <div class="form-group">
        <label><i class="fas fa-user"></i> First Name</label>
        <input type="text" id="signup-fname" class="form-control" placeholder="First Name">
      </div>
      <div class="form-group">
        <label><i class="fas fa-user"></i> Last Name</label>
        <input type="text" id="signup-lname" class="form-control" placeholder="Last Name">
      </div>
    </div>

    <div class="form-group">
      <label><i class="fas fa-envelope"></i> Email Address</label>
      <input type="email" id="signup-email" class="form-control" placeholder="yourname@example.com">
    </div>
    <div class="form-group">
      <label><i class="fas fa-mobile-screen"></i> Mobile Number</label>
      <input type="tel" id="signup-mobile" class="form-control" placeholder="10-digit mobile number">
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> Password</label>
      <input type="password" id="signup-password" class="form-control" placeholder="Minimum 8 characters">
    </div>
    <div class="form-group">
      <label><i class="fas fa-lock"></i> Confirm Password</label>
      <input type="password" id="signup-confirm" class="form-control" placeholder="Re-enter your password">
    </div>

    <button class="btn-primary" onclick="doSignup()" id="btn-signup">
      <i class="fas fa-user-plus"></i> Create Account
    </button>

    <div class="login-link">
      <i class="fas fa-arrow-left"></i> Already have an account?
      <a href="login.html">Login here</a>
    </div>
  </div>
</div>

<!-- ── ANIMATED BACKGROUND ── -->
<script>
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, nodes;

  function resize(){
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function initNodes(n){
    nodes = [];
    for(let i=0;i<n;i++){
      const t = Math.random();
      nodes.push({
        x:  Math.random()*W, y:  Math.random()*H,
        r:  1.2 + Math.random()*2.6,
        vx: (Math.random()-.5)*.38, vy: (Math.random()-.5)*.38,
        c:  t<.5?0:t<.82?1:2,
        a:  .4+Math.random()*.55,
        pulse: Math.random()*Math.PI*2,
        pSpeed: .012+Math.random()*.025
      });
    }
  }

  const NC = ['rgba(21,101,192,','rgba(245,124,0,','rgba(255,255,255,'];

  function draw(){
    ctx.clearRect(0,0,W,H);

    const bg = ctx.createLinearGradient(0,0,W,H);
    bg.addColorStop(0,  '#0a2540');
    bg.addColorStop(.5, '#0e3460');
    bg.addColorStop(1,  '#0d1f3c');
    ctx.fillStyle = bg;
    ctx.fillRect(0,0,W,H);

    // grid
    ctx.strokeStyle='rgba(255,255,255,.022)'; ctx.lineWidth=.6;
    for(let x=0;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<H;y+=80){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

    // lines
    for(let i=0;i<nodes.length;i++){
      for(let j=i+1;j<nodes.length;j++){
        const dx=nodes[i].x-nodes[j].x, dy=nodes[i].y-nodes[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<155){
          const al=(1-d/155)*.2;
          const oc=(nodes[i].c===1||nodes[j].c===1);
          ctx.strokeStyle=(oc?'rgba(245,124,0,':'rgba(21,101,192,')+al+')';
          ctx.lineWidth=.8;
          ctx.beginPath(); ctx.moveTo(nodes[i].x,nodes[i].y); ctx.lineTo(nodes[j].x,nodes[j].y); ctx.stroke();
        }
      }
    }

    // nodes
    nodes.forEach(n=>{
      n.pulse+=n.pSpeed;
      const pa=n.a*(.75+.25*Math.sin(n.pulse));
      const cr=NC[n.c];
      const g=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*5);
      g.addColorStop(0,cr+pa*.38+')'); g.addColorStop(1,cr+'0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(n.x,n.y,n.r*5,0,Math.PI*2); ctx.fill();
      ctx.fillStyle=cr+pa+')'; ctx.beginPath(); ctx.arc(n.x,n.y,n.r,0,Math.PI*2); ctx.fill();
      n.x+=n.vx; n.y+=n.vy;
      if(n.x<-20)n.x=W+20; if(n.x>W+20)n.x=-20;
      if(n.y<-20)n.y=H+20; if(n.y>H+20)n.y=-20;
    });

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize',()=>{resize();initNodes(95);});
  resize(); initNodes(95); draw();
})();
</script>

<!-- ── FIREBASE ── -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script src="js/firebase-config.js"></script>
<script>
async function doSignup() {
  const fname  = document.getElementById('signup-fname').value.trim();
  const lname  = document.getElementById('signup-lname').value.trim();
  const email  = document.getElementById('signup-email').value.trim();
  const mobile = document.getElementById('signup-mobile').value.trim();
  const pass   = document.getElementById('signup-password').value;
  const conf   = document.getElementById('signup-confirm').value;

  if (!fname||!lname||!email||!pass||!conf) { showToast('Please fill all required fields','error'); return; }
  if (pass!==conf)   { showToast('Passwords do not match','error'); return; }
  if (pass.length<8) { showToast('Password must be at least 8 characters','error'); return; }

  const btn = document.getElementById('btn-signup');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating account…';
  setProgress('Step 1 of 2 — Creating account…', 50);

  let cred;
  try {
    cred = await auth.createUserWithEmailAndPassword(email, pass);
    await cred.user.updateProfile({ displayName: `${fname} ${lname}` });
  } catch(authErr) {
    showToast(friendlyError(authErr.code, authErr.message), 'error');
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
    setProgress('Step 1 of 2 — Personal Details', 50);
    return;
  }

  setProgress('Step 2 of 2 — Saving profile…', 100);
  try {
    await cred.user.getIdToken(true);
    await db.collection('users').doc(cred.user.uid).set({
      uid: cred.user.uid, firstName: fname, lastName: lname,
      email, mobile, role: 'student',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('Account created! Redirecting…', 'success');
    setTimeout(()=>{ window.location.href='pages/dashboard.html'; }, 1500);
  } catch(fsErr) {
    showToast('Account created but profile save failed: ' + friendlyError(fsErr.code, fsErr.message), 'error', 8000);
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-rotate-right"></i> Retry Save Profile';
    setProgress('Step 2 of 2 — Save failed', 75);
    btn.onclick = ()=>retryFirestoreWrite(cred.user, {fname,lname,email,mobile});
  }
}

async function retryFirestoreWrite(user, {fname,lname,email,mobile}) {
  const btn = document.getElementById('btn-signup');
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Retrying…';
  try {
    await user.getIdToken(true);
    await db.collection('users').doc(user.uid).set({
      uid:user.uid, firstName:fname, lastName:lname,
      email, mobile, role:'student',
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });
    showToast('Profile saved! Redirecting…','success');
    setTimeout(()=>{ window.location.href='pages/dashboard.html'; },1500);
  } catch(e) {
    showToast('Still failing: '+friendlyError(e.code,e.message),'error',8000);
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-rotate-right"></i> Retry Save Profile';
  }
}

function setProgress(text, pct) {
  document.getElementById('progress-text').textContent = text;
  document.getElementById('progress-pct').textContent  = pct+'%';
  document.getElementById('progress-fill').style.width = pct+'%';
}

function friendlyError(code, fallback) {
  return ({
    'auth/email-already-in-use':   'An account with this email already exists.',
    'auth/invalid-email':          'Invalid email address.',
    'auth/weak-password':          'Password is too weak.',
    'auth/too-many-requests':      'Too many attempts. Please wait.',
    'auth/network-request-failed': 'Network error. Check your connection.',
    'permission-denied':           'Firestore permission denied — check your security rules.',
  })[code] || fallback;
}

function showToast(msg, type='info', duration=4000) {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  const icon = type==='success'?'circle-check':type==='error'?'circle-xmark':'triangle-exclamation';
  t.innerHTML = `<i class="fas fa-${icon}" style="flex-shrink:0;margin-top:2px;"></i><span>${msg}</span>`;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>t.classList.add('show'),10);
  setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),400); },duration);
}
</script>
</body>
</html>
